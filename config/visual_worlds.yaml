      - deep Aegean blue
      - olive grove green
      - terracotta
      - parchment cream
      - deep classical shadow
    motifs:
      - doric columns
      - marble agora
      - olive trees
      - sea horizon
      - draped robes
      - philosopher silhouettes
      - parchment scrolls
      - broken vases
    common_overlays:
