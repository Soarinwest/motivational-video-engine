      broken_amphora_shore: >-
        a broken terracotta amphora half-buried in sand at the edge of
        the Aegean, calm sea, sun-bleached driftwood
      plato_examined_life: >-
        the Athenian agora at dusk, marble columns silhouetted against a
        fading violet sky, a distant Acropolis on the hill, contemplative
        philosophical atmosphere
      epictetus_control_vineyard: >-
        a Mediterranean hillside vineyard at golden hour, terraced fields
        with dry stone walls, weathered tools at the edge of a path,
        distant sea, disciplined ancient pastoral atmosphere
      aristotle_habit_coast: >-
        an olive grove on a Mediterranean coastline at golden hour, knotted
        trees, dappled light on a worn stone path leading down to the sea,
        ancient pastoral atmosphere
      plato_inner_order_temple: >-
        the interior of an ancient Greek temple at dusk, tall fluted marble
