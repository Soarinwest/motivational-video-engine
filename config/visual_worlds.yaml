  mythic:
    description: >-
      Bronze-age warriors, ancient shorelines, wind-scoured ridges, and
      camp-fire embers. Heroic but grounded — for Homer, Beowulf, the
      Iliad-Odyssey lineage. Not fantasy armor, not exaggerated muscles.
    mood:
      - severe
      - heroic
      - mournful
      - elemental
      - weathered
      - epic
    palette:
      - bronze
      - storm-cloud charcoal
      - cold sea blue
      - ash grey
      - banked ember orange
      - weathered leather brown
    motifs:
      - bronze helmets and shields
      - long ships on dark shores
      - extinguished campfires
      - wind-scoured ridges
      - cliffs above grey seas
      - cracked stone cairns
    common_overlays:
      - drifting_ash
      - storm_haze
      - subtle_grain
      - sea_spray
    recommended_motion_profiles:
      - static
      - slow_zoom
      - slow_pan
    suitable_series:
      - hard_truths_for_men
    suitable_authors:
      - Homer
      - Hesiod
      - the Beowulf poet

    background_prompts:
      # Iliad
      war_camp_fire_meadow: >-
        an empty Bronze-age war camp at dawn, extinguished fire pits,
        scattered weapons on bare ground, a single bronze helmet upturned
        beside the fire, distant snow-capped mountains, mythic and
        mournful atmosphere
      greek_ship_storm: >-
        an ancient Greek sailing ship caught in towering stormy waves at
        sea, dramatic god-light through breaking clouds, mythic and
        elemental atmosphere
      hector_city_gates: >-
        the towering bronze-age walls of an ancient city at sunset, the
        gate yawning open, a warrior in worn bronze armor walking through
        with his cloaked wife and small child at his side, weeping but
        proud, severe and elegiac atmosphere
      priam_in_tent: >-
        the interior of a Bronze-age war commander's tent at night, a
        single oil lamp casting warm shadows on hanging cloth and a low
        table, an old king kneeling before a seated warrior, atmosphere
        of grief, mercy, and weighted silence

      # Odyssey
