      ithaca_homecoming_path: >-
        an ancient stone path through olive groves at golden hour,
        leading toward a distant Doric temple above the sea, rugged
        Mediterranean landscape, atmosphere of homecoming
      woman_on_city_walls: >-
        a noblewoman in dark robes seen from behind, standing on
