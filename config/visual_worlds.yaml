# Visual worlds for motive-engine.
#
# Each world defines an aesthetic vocabulary. Content specs pick a world by
# name and a background_prompt_key / figure_prompt_key from that world's
# catalogs. The image_prompt_template combines those phrases with the spec's
# author + theme into a ready-to-paste image-generator prompt.
#
# Template placeholders: {background}, {figure}, {author}, {theme}.
# A template may omit placeholders it doesn't need (e.g. field_notes has no
# {figure}). The engine always supplies all four; unused ones are dropped.

worlds:

  # -----------------------------------------------------------------------
  stoic_rome:
    description: >-
      Roman ruins, marble busts, fluted columns, storm light, drifting ash,
      cold golden dawn. Severe, disciplined, ancient.
    mood:
      - severe
      - disciplined
      - ancient
      - quiet
      - weighty
      - reverent
    palette:
      - cold marble white
      - slate grey
      - weathered bronze
      - ochre dust
      - storm-cloud charcoal
      - cold golden dawn light
    motifs:
      - marble busts
      - fluted columns
      - ruined courtyards
      - eagle reliefs
      - lictor's fasces
      - drifting ash
      - distant temples
      - paved Roman roads
    common_overlays:
      - dust_motes
      - drifting_ash
      - subtle_grain
      - storm_haze
    recommended_motion_profiles:
      - slow_zoom
      - static
      - slow_pan
    suitable_series:
      - stoic_practice
    suitable_authors:
      - Marcus Aurelius
      - Seneca
      - Epictetus
      - Cato the Younger
      - Cicero

    background_prompts:
      ruined_courtyard_dawn: >-
        a ruined Roman courtyard at dawn, broken paving stones, fluted
        columns to one side, storm clouds breaking above distant ruins
      stoic_road_at_dawn: >-
        an empty paved Roman road at dawn, milestones to one side, fields
        of dry grass, low storm clouds on the horizon
      ruined_temple_storm: >-
        the steps of a ruined Roman temple under storm light, cracked
        marble, weathered columns, distant lightning
      empty_amphitheater: >-
        the empty stone tiers of a Roman amphitheater at dusk, long
        shadows, drifting dust in cold light
      broken_column_ash: >-
        a single broken marble column standing in a field of grey ash,
        cold morning light, distant ruins on the horizon
      aristotle_choice_marble: >-
        a sculptor's chisel resting on a block of partially carved marble in
        a quiet stone workshop at dawn, fine marble dust on the bench, chisel
        marks visible, severe and disciplined ancient atmosphere
      antigone_ruined_courtyard: >-
        an empty ruined Roman courtyard at dawn after a city has fallen,
        broken stone steps, drifting ash, distant smoke beyond the columns,
        tragic and severe atmosphere
      marcus_forum_morning: >-
        an empty Roman forum at first light, weathered marble paving stones,
        a long colonnade in cold golden dawn, distant temples in mist,
        severe and disciplined ancient atmosphere
      marcus_temple_platform: >-
        the sunlit upper platform of a weathered Roman temple, fluted
        marble columns casting long shadows, a worn marble step in the
        foreground, cold golden light, severe and disciplined atmosphere
      marcus_road_mist: >-
        an empty paved Roman road disappearing into low morning mist,
        weathered milestones to one side, cold grey light, a sense of
        a single figure having just walked past, severe and elegiac
        atmosphere
      seneca_writing_desk: >-
        a Roman writing desk at dawn beside a tall window, a half-finished
        letter and stylus on parchment, a single oil lamp burning low,
        cold storm light beyond the window, restrained and disciplined
        atmosphere
      seneca_stone_room_morning: >-
        a quiet bare stone room at morning, a single book on a worn
        wooden table, one chair, a tall window open to soft morning
        light over distant ruins, restrained and contemplative atmosphere
      seneca_stone_room_dusk: >-
        a quiet bare stone room at dusk, a closed ledger and stylus on a
        worn wooden table, a single candle nearly burned out, the last
        cold light fading at the window, restrained and severe atmosphere

      # ----- Rome arc — subject-in-scene backgrounds (15 figure-centric) -----
      # These bgs have a named Roman figure as the foreground subject; for the
      # newer "scene-only, subject-as-figure-cutout" pattern see prompts 16-20.
      marcus_emperor_at_lamp: >-
        Marcus Aurelius writing alone by oil lamp inside a military tent on
        the Danube frontier, plain dark cloak over simple armor, scrolls and
        wax tablets on a wooden campaign table, rain outside, Roman standards
        in shadow, tired but disciplined, bronze and storm gray and cold gold
      marcus_do_not_argue_goodness: >-
        Marcus Aurelius at dawn before a quiet Roman camp, soldiers and red
        standards in mist behind him, face calm and severe, one hand on a
        worn leather journal, cold morning light over distant hills, duty
        without applause
      seneca_shortness_of_life: >-
        Seneca seated in a sparse Roman study, old scrolls beside him,
        sunlight cutting across marble floor, a small water clock nearby,
        thoughtful and unsentimental, wealthy surroundings subdued by moral
        seriousness, parchment and bronze and cold gold
      seneca_imagined_suffering: >-
        Seneca standing beside a dark window during a Roman storm, folded
        letter in hand, candlelight behind him, calm while shadows gather
        across the room, Stoic restraint, black marble and bronze and
        storm gray
      cicero_duty_over_advantage: >-
        Cicero on the steps of the Roman Senate, toga wrapped tight against
        wind, blurred senators behind, bronze doors open into darkness,
        serious and morally burdened, marble white and deep red and bronze
      cincinnatus_power_to_plow: >-
        Cincinnatus in a small Roman field at sunrise, one hand on a wooden
        plow, simple farmer's tunic, Roman messengers approaching with
        military cloaks and standards in the distance, humble and resolute,
        earth brown and muted red and cold gold
      caesar_crossing_rubicon: >-
        Julius Caesar on horseback at the edge of a narrow river at night,
        legionaries waiting in silence behind, red standards lowered in mist,
        torchlight on black water, decisive and unreadable, storm gray and
        deep red and cold gold
      brutus_republic_over_blood: >-
        Brutus alone inside a shadowed Roman chamber, dagger on a marble
        table before him, busts of ancestors lining the walls, faint red
        light from outside, torn but controlled, marble white and bronze
        and storm gray
      tacitus_desert_and_peace: >-
        Tacitus seated among ruined arches at dusk, writing on a scroll
        while distant Roman soldiers march across a barren conquered
        landscape, smoke rising on the horizon, cold and observant, ash
        gray and bronze and deep red
      sallust_republic_rots_appetite: >-
        a decaying Roman banquet hall after midnight, overturned wine cups,
        wilted garlands, marble statues watching in silence, a single Roman
        historian apart with a scroll, disgusted and sorrowful, black marble
        and wine red and bronze
      marcus_leave_life_now: >-
        Marcus Aurelius alone beside a funeral pyre at dusk, smoke rising
        into a storm gray sky, Roman campfires glowing in the distance, calm
        and mortal, no crown, only duty and impermanence, ash gray and
        bronze and cold gold
      marcus_inner_citadel: >-
        Marcus Aurelius seated in meditation inside a dark stone chamber,
        faint golden light outlining his face, chaos of battle suggested
        only as shadows on the wall, steady and inwardly sovereign, black
        stone and bronze and cold gold
      virgil_burden_of_destiny: >-
        Aeneas carrying his elderly father through burning Troy, child
        following close behind, flames on bronze armor, smoke and ash
        filling the night sky, determined and grief-stricken, fire gold
        and ash gray and bronze
      virgil_founding_through_loss: >-
        Aeneas standing on a dark Italian shoreline at dawn, Trojan ships
        behind him, sword lowered, marked by grief and resolve, distant
        hills of future Rome through mist, cold gold and dark blue sea
      lucretius_fear_of_death: >-
        Lucretius beneath a vast night sky outside Rome, small oil lamp in
        hand, stars above ancient ruins, skull and flowers on a stone table
        nearby, calm and philosophical, black sky and marble white and cold
        silver

      # ----- Rome arc — scene-only backgrounds (no named subject) -----
      # These follow the newer principle: scenes hold the world; figures
      # (if any) are composited via alpha as foreground subjects.
      senate_steps_in_rain: >-
        empty Roman Senate steps under heavy rain, red cloak abandoned on
        wet marble, bronze doors closed, storm clouds above the Forum,
        political consequence and silence after decision, marble white and
        storm gray and deep red
      legion_road_at_dawn: >-
        Roman legion road across misty hills at dawn, soldiers marching in
        disciplined silence, red standards and bronze eagles in cold gold
        light, no celebration, only endurance and duty, muted red and bronze
        and storm gray
      ruined_forum_after_empire: >-
        the Roman Forum in ruins at twilight, broken columns, cracked
        marble statues, grass through stone, distant birds in a storm gray
        sky, vanished power and human impermanence, marble white and ash
        gray and bronze
      bronze_eagle: >-
        close view of a Roman bronze eagle standard planted in dark earth
        after battle, torn red banner moving in cold wind, helmets and
        shields scattered nearby, no bodies visible, cost behind victory,
        bronze and deep red and storm gray
      oil_lamp_and_scroll: >-
        single oil lamp burning beside an open Roman scroll on a marble
        table, shadows of columns falling across the room, distant soundless
        storm outside, austere philosophical mood, warm gold and black
        marble and parchment

    figure_prompts:
      marcus_bust_storm_light: >-
        a weathered marble bust of Marcus Aurelius in cold storm light,
        textured marble, dignified expression, not speaking
      seneca_seated_lamplight: >-
        a robed figure of Seneca seated at a stone desk by lamplight,
        face partly in shadow, restrained posture
      anonymous_centurion_silhouette: >-
        the silhouette of a Roman centurion standing alone, helmet under
        one arm, back to the viewer, looking toward the horizon
      none: ""

    image_prompt_template: |
      Create a cinematic vertical 9:16 image for a video about {theme},
      in the spirit of {author}.

      In the foreground, {figure}. The setting is {background}. The light
      is severe and disciplined. Restrained colors, weathered surfaces,
      ancient atmosphere. Leave dark negative space in the upper third for
      captions.

      Style: painterly realism, cinematic lighting, textured marble and
      stone, historical atmosphere, serious and masculine, not cartoonish,
      not glossy, not fantasy.

    negative_prompt: >-
      modern objects, modern clothing, text, watermark, logo, fantasy
      armor, exaggerated muscles, neon lighting, glossy AI render,
      smiling face, influencer pose, extra fingers, distorted face, anime,
      cartoon

