      Bronze-age Trojan war: war camps, fortified city walls, oil-lit
      tents, broken shields, ships beached beneath Troy. Heroic but
      grounded — for Homer's Iliad. Not fantasy armor, not exaggerated
      muscles. Severe and mournful, not triumphalist.
