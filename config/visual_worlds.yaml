        the open sea, the moon visible through the rocky opening, dark
        waves on glistening rocks, weathered and elemental atmosphere
      calypso_island_twilight: >-
        a solitary stone cottage on an island shore at twilight, glowing
        windows, grass path leading toward the sea, distant tree-lined
        coast, mythic and longing atmosphere
      penelope_by_window: >-
        a woman in flowing ancient Greek robes seated quietly by a wide
        window in a dim stone interior, oil lamp on a small table beside
        her, sea visible in the distance through the window, atmosphere
        of patient grief and waiting
      bow_in_great_hall: >-
        an ornate ancient bow with arrows resting on the polished stone
        floor of a vast candlelit ancient hall, low ottoman beside it,
        chandeliers and tall columns, atmosphere of return and judgement
      ithaca_dawn_cliffs: >-
        rugged Mediterranean cliffs at dawn with olive trees, an ancient
        stone village clinging to the rocks above the sea, golden light,
        homecoming atmosphere
      odysseus_shoreline: >-
        a cloaked figure standing on a cliff edge looking out over a dark
        sea at sunset, distant rocky islets, weathered and still
      odysseus_shoreline_dawn: >-
        a cloaked figure on rocky cliffs at dawn, dramatic sky with
        shafts of cold light through clouds, churning sea below,
        epic and weathered atmosphere
      boat_on_shore_sunset: >-
        a single small wooden fishing boat on calm sandy beach at sunset,
