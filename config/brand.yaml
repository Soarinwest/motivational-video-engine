# Brand identity for motive-engine.
# Edit freely. The engine reads named profiles from here.

name: motive-engine
creed: Hard truth. Clean heart.

tone:
  description: >
    Masculine, direct, calm, load-bearing. Discipline without resentment.
    Hard truth without contempt.
  qualities:
    - direct
    - earned
    - without_enemies
    - without_grievance

# Music profiles referenced by content specs (audio.music_profile).
#
# Each profile may declare a `folder` under assets/music/ — the render stage
# picks the first .mp3 in that folder, loops or trims it to the voice duration,
# and mixes it under the voice at `gain_db` (default -18 dB below 0 dBFS).
# A profile with no `folder` is silent (current behavior for `silence`).
music_profiles:
  ambient_low:
    description: Low ambient drone. No melody. No percussion.
    folder: ancient_low_drone
    gain_db: -16
  ambient_strings_low:
    description: Sustained low strings. Sparse, mournful, not melodramatic.
    folder: low_strings
    gain_db: -14
  soft_lyre_ambient:
    description: Mellow ambient with melodic instruments. Reflective.
    folder: soft_lyre_ambient
    gain_db: -14
  somber_cinematic:
    description: Dark, dramatic, cinematic. For war and tragedy material.
    folder: somber_cinematic
    gain_db: -12
  silence:
    description: No music. Use sparingly.

  # ----- Iliad-specific motifs (Homer war epic) -----
  bardic_invocation:
    description: Ancient kingdom-scale opening. For invocations, epic openings, narrator-frames-the-whole-tale.
    folder: bardic_invocation
    gain_db: -14
  bronze_war_camp:
    description: War drums under stillness. The camp before the battle, the discipline beneath the carnage. For Iliad set-pieces.
    folder: bronze_war_camp
    gain_db: -13
  dark_rage:
    description: Heavy war drums, propulsive, dark. For Patroclus rage, Achilles unmoored, anger as fuel.
    folder: dark_rage
    gain_db: -12
  grief_lament:
    description: Epic strings in mourning register. For Hector's farewell, Andromache's news, Priam in the tent.
    folder: grief_lament
    gain_db: -13
  underworld_grief:
    description: Cinematic dark, weighted. For Thetis with Achilles, the late Iliad mortality material.
    folder: underworld_grief
    gain_db: -13

  # ----- Odyssey-specific motifs (Homer voyage epic) -----
  aegean_voyage:
    description: Epic with motion. For wide-sea passages, embarkation, the long return.
    folder: aegean_voyage
    gain_db: -13
  island_enchantment:
    description: Exotic flute and strings. For Calypso, Circe, the seduction-island scenes.
    folder: island_enchantment
    gain_db: -14
  cave_tension:
    description: Dark, tense, low menace. For Polyphemus, the Sirens, danger held at arm's length.
    folder: cave_tension
    gain_db: -13
  underworld_descent:
    description: Cinematic dread. For Book XI — the descent to consult the dead.
    folder: underworld_descent
    gain_db: -12
  homecoming_recognition:
    description: Strings, warm but severe. For Penelope's bed-test, the olive-tree bed, the recognitions.
    folder: homecoming_recognition
    gain_db: -14

  # ----- Heroic / Roman / cross-arc -----
  heroic_honor:
    description: Honor and sword register. For Cincinnatus, Cicero, restrained Roman virtue.
    folder: heroic_honor
    gain_db: -14

  # ----- Norse / Anglo-Saxon (Season 04 staging) -----
  norse_skald_chant:
    description: Viking chant, ancient. For Havamal, opening Norse arcs.
    folder: norse_skald_chant
    gain_db: -13
  norse_hall_of_slain:
    description: Valhalla register. For warrior-death pieces.
    folder: norse_hall_of_slain
    gain_db: -13
  norse_seeress:
    description: Spaekona / völva chant. For Voluspa, prophecy, fate-of-the-gods material.
    folder: norse_seeress
    gain_db: -13
  norse_shieldmaiden:
    description: Skjaldmær. For Norse women's-grief and battle material.
    folder: norse_shieldmaiden
    gain_db: -13

  # ----- Northern fate (Season 04 — Norse / Anglo-Saxon) -----
