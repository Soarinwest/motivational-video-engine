hook: 'In Meditations Book II, Marcus writes the single sentence the rest of the book is built around:'
voiceover: "In Meditations Book II, Marcus writes the single sentence the rest of the book is built around:\n\n\"Since it\
  \ is possible that thou mayest depart from life this very moment, regulate every act and thought accordingly.\"\n\nDeath\
  \ is not a future event.\n\nIt is the standard against which the next move is measured.\n\nIf this were the last act \u2014\
  \ would you still be doing it this way?\n\nRegulate the next act accordingly."
final_line: Regulate the next act accordingly.
