message: 'In Meditations Book II, Marcus opens his day with a warning to himself:'
hook: 'In Meditations Book II, Marcus opens his day with a warning to himself:'
voiceover: 'In Meditations Book II, Marcus opens his day with a warning to himself:


  "Begin the morning by saying to thyself, I shall meet with the busybody, the ungrateful, arrogant, deceitful, envious, unsocial."


  He is not bitter.

  He is rehearsing the friction in advance.


  A man who already saw it coming is not deformed by it when it arrives.


  Today you will meet people at their worst.


  None of it should surprise you.'
final_line: None of it should surprise you.
