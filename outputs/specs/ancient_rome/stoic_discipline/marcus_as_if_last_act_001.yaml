hook: 'In Meditations Book II, Marcus instructs himself on the next thing in front of him:'
voiceover: "In Meditations Book II, Marcus instructs himself on the next thing in front of him:\n\n\"Every moment think steadily,\
  \ as a Roman and a man, to do what thou hast in hand with perfect and simple dignity \u2014 and to give thyself relief from\
  \ all other thoughts.\"\n\nMost failure is not lack of effort.\n\nIt is the part of the mind that is somewhere else while\
  \ the hands work.\n\nThe man who lays down every other thought owns the moment in front of him.\n\nPut the rest down."
final_line: Put the rest down.
