id: marcus_soon_forgotten_001
series: stoic_practice
author: Marcus Aurelius (Meditations)
theme: mortality
duration_seconds: 30
message: In Meditations Book Seven, Marcus is the most powerful man alive.
hook: In Meditations Book Seven, Marcus is the most powerful man alive.
voiceover: 'In Meditations Book Seven, Marcus is the most powerful man alive.


  Statues will be erected of him. Histories will be written about him.


  He sits in his tent and writes himself the line that should disturb any man in his position:


  "Near is thy forgetfulness of all things. And near the forgetfulness of thee by all."


  Legacy is the wrong target.


  The present act has to be its own reason.


  Most ambitious work is quietly underwritten by the fantasy of being remembered.


  Marcus removes the underwriter.


  Everything will soon forget you.'
final_line: Everything will soon forget you.
