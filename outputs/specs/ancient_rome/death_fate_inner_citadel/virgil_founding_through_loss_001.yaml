message: 'In the opening of the Aeneid, Virgil lays out what the poem will cover: exile, war, the long sea, the dead left
  behind, the eventual founding of Rome.'
hook: 'In the opening of the Aeneid, Virgil lays out what the poem will cover: exile, war, the long sea, the dead left behind,
  the eventual founding of Rome.'
voiceover: 'In the opening of the Aeneid, Virgil lays out what the poem will cover: exile, war, the long sea, the dead left
  behind, the eventual founding of Rome.


  He closes the prologue with one line:


  "Such time, such toil, required the Roman name, such length of labour for so vast a frame."


  Virgil refuses to romanticize the work.


  He names it labor.


  Nothing worth founding gets founded cheaply.


  The man who imagines he can found a company, a family, a habit, without paying its cost has misread the genre.


  So great a labor.'
final_line: So great a labor.
