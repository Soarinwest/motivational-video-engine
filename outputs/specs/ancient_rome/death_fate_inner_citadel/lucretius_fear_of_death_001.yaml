message: 'In Book Three of De Rerum Natura, Lucretius takes the longest run at any subject in his poem: the fear of death.'
hook: 'In Book Three of De Rerum Natura, Lucretius takes the longest run at any subject in his poem: the fear of death.'
voiceover: 'In Book Three of De Rerum Natura, Lucretius takes the longest run at any subject in his poem: the fear of death.


  His argument is cold and clean:


  "Death therefore is nothing to us, nor concerns us in the least."


  When death arrives, you are not there to meet it.

  When you are here, it is not.


  Lucretius is not arguing that dying is fine.


  He is arguing that the fear of death is what steals the years you still have.


  Stop rehearsing it.


  And the time stays yours.'
final_line: And the time stays yours.
