message: 'In Meditations Book X, Marcus writes one line to himself and then closes the conversation:'
hook: 'In Meditations Book X, Marcus writes one line to himself and then closes the conversation:'
voiceover: 'In Meditations Book X, Marcus writes one line to himself and then closes the conversation:


  "No longer talk at all about the kind of man that a good man ought to be, but be such."


  Every hour spent characterizing the right kind of man is an hour not spent being one.


  The argument about virtue is not the practice of virtue.


  Stop describing.

  Stop debating.

  Stop performing the conversation.


  Be one.'
final_line: Be one.
