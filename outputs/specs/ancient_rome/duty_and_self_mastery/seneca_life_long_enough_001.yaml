message: 'In On the Shortness of Life, Seneca opens with the universal complaint, and then inverts it:'
hook: 'In On the Shortness of Life, Seneca opens with the universal complaint, and then inverts it:'
voiceover: "In On the Shortness of Life, Seneca opens with the universal complaint, and then inverts it:\n\n\"It is not that\
  \ we have a short time to live, but that we waste much of it. Life is long enough \u2014 if it were all well invested.\"\
  \n\nYou do not have too little life.\n\nYou waste too much of the life you have.\n\nTime is not the scarce resource. Attention\
  \ is.\n\nThe man who attends to his life finds it long enough.\n\nInvest the rest."
final_line: Invest the rest.
