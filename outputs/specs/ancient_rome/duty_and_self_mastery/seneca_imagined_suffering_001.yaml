message: 'In Letter Thirteen, Seneca writes to Lucilius about the fears that wear a man out before the thing he fears arrives:'
hook: 'In Letter Thirteen, Seneca writes to Lucilius about the fears that wear a man out before the thing he fears arrives:'
voiceover: "In Letter Thirteen, Seneca writes to Lucilius about the fears that wear a man out before the thing he fears arrives:\n\
  \n\"There are more things likely to frighten us than there are to crush us. We suffer more often in imagination than in\
  \ reality.\"\n\nMost of the catastrophe is in your head.\n\nThe body endures less than the mind rehearses.\n\nImagined suffering\
  \ is the cheap kind \u2014 paid for in advance, on a debt that mostly never comes due.\n\nStop rehearsing it."
final_line: Stop rehearsing it.
