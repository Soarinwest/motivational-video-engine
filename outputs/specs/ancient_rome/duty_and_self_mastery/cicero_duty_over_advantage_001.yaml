hook: 'In De Officiis Book Three, Cicero takes up the oldest excuse and refuses it:'
voiceover: "In De Officiis Book Three, Cicero takes up the oldest excuse and refuses it:\n\n\"Whatever is morally right is\
  \ also expedient, and what is morally wrong is also inexpedient.\"\n\nRight and useful are not opposites.\n\nThe man who\
  \ pits honor against advantage has misread both.\n\nThere is no clean transaction in which you trade conscience for gain.\n\
  \nThe man who thinks he made it pays later \u2014 and not in the currency he expected.\n\nThere is no clean trade."
final_line: There is no clean trade.
