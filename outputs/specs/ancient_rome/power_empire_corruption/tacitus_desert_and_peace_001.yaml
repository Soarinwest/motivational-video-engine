voiceover: "In his book on his father-in-law Agricola, the Roman historian Tacitus gives the harshest critique of Roman conquest\
  \ to a Caledonian chieftain on the eve of his last battle:\n\n\"To plunder, butcher, steal \u2014 these things they misname\
  \ empire. They make a desert and call it peace.\"\n\nTacitus is a Roman writing about his own.\n\nHe admits the conquered\
  \ are not wrong.\n\nPower renames its costs to make them disappear from the ledger.\n\nAny time the word does not match\
  \ the thing it describes \u2014 look for the desert.\n\nThey call it peace."
final_line: They call it peace.
