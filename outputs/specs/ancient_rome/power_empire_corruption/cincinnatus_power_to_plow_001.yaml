message: In Livy's history, Rome is in crisis. The Senate calls Cincinnatus from his small farm and makes him dictator.
hook: In Livy's history, Rome is in crisis. The Senate calls Cincinnatus from his small farm and makes him dictator.
voiceover: 'In Livy''s history, Rome is in crisis. The Senate calls Cincinnatus from his small farm and makes him dictator.


  In sixteen days he raises an army, defeats the enemy, and lifts the siege.


  Then he lays down absolute power, picks up his plow, and walks home.


  The test of character is not the seizing.


  It is the release.


  Most men can be trusted to take a sword.

  Almost none can be trusted to set it down on the table while the room is still afraid.


  He went back to the plow.'
final_line: He went back to the plow.
