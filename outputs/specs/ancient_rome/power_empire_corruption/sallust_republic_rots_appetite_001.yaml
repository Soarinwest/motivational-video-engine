hook: In The Conspiracy of Catiline, Sallust looks back on civil wars he has lived through. He sits down to explain how Rome
  got here, and his answer is not Catiline.
voiceover: "In The Conspiracy of Catiline, Sallust looks back on civil wars he has lived through. He sits down to explain\
  \ how Rome got here, and his answer is not Catiline.\n\nHis answer is appetite:\n\n\"Avarice destroyed honor, integrity,\
  \ and every other virtue, and put arrogance and cruelty in their place.\"\n\nA republic does not fall to invasion.\n\nIt\
  \ rots from inside \u2014 once external pressure ends and internal hunger has nothing left to push against.\n\nInstitutions\
  \ are hollowed out by the long abandonment of the small disciplines that kept them upright.\n\nCatiline is what grew in\
  \ the soil they stopped tending."
final_line: Catiline is what grew in the soil they stopped tending.
