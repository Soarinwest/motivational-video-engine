id: seneca_remain_in_one_place_001
series: stoic_practice
author: Seneca (Letters)
theme: restraint
duration_seconds: 30
message: 'In his second letter to Lucilius, Seneca writes:'
hook: 'In his second letter to Lucilius, Seneca writes:'
voiceover: 'In his second letter to Lucilius, Seneca writes:


  "The primary indication, to my thinking, of a well-ordered mind is a man''s ability to remain in one place and linger in
  his own company."


  Scattering across many books, many feeds, many cities is not curiosity.


  It is restlessness wearing the costume of curiosity.


  The settled mind does not need to be somewhere else.


  Stay.'
final_line: Stay.
