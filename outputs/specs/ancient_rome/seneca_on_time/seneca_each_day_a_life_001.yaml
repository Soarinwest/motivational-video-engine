message: 'In Letter XII to Lucilius, Seneca writes:'
hook: 'In Letter XII to Lucilius, Seneca writes:'
voiceover: 'In Letter XII to Lucilius, Seneca writes:


  "Let us so order our minds as if we had come to the end. Let us postpone nothing. Let us balance life''s books each day."


  A life is built out of days that have been closed.


  Not days carried over.


  The man who postpones is not waiting.

  He is leaking life into a tomorrow that may not arrive.


  Close the day.'
final_line: Close the day.
