message: 'Ecclesiastes opens with a hard sentence:'
hook: 'Ecclesiastes opens with a hard sentence:'
voiceover: 'Ecclesiastes opens with a hard sentence:


  "Vanity of vanities, saith the Preacher, vanity of vanities; all is vanity."


  This is not an excuse to do nothing.

  It is a warning against worshiping what passes.


  Work passes.

  Praise passes.

  Youth passes.

  Possession passes.


  The question is not whether you should build.


  The question is whether you have mistaken the building for your soul.


  Do the work.

  Do not kneel to it.'
final_line: Do not kneel to it.
