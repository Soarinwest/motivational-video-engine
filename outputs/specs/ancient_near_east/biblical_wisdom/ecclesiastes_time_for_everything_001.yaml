series: literary_dark
author: Ecclesiastes (Qoheleth)
theme: duty
duration_seconds: 30
message: 'Ecclesiastes says:'
hook: 'Ecclesiastes says:'
voiceover: 'Ecclesiastes says:


  "To every thing there is a season, and a time to every purpose under the heaven."


  This is not passivity.

  It is timing.


  There is a time to build.

  A time to stop.

  A time to speak.

  A time to be silent.


  Wisdom is not doing everything with force.


  Wisdom is knowing what the hour requires.


  Do not demand harvest from a season of planting.'
final_line: Do not demand harvest from a season of planting.
