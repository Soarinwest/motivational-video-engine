id: psalm_valley_shadow_001
series: literary_dark
author: Psalms
theme: courage
duration_seconds: 30
message: The psalm does not say there is no valley.
hook: The psalm does not say there is no valley.
voiceover: 'The psalm does not say there is no valley.


  It says:


  "Yea, though I walk through the valley of the shadow of death, I will fear no evil."


  The shadow is real.

  The path is real.

  The danger is real.


  But fear is not given the throne.


  Some darkness has to be walked through, not explained away.


  Keep walking.


  The valley is not your final name.'
final_line: The valley is not your final name.
