message: 'Isaiah hears the question:'
hook: 'Isaiah hears the question:'
voiceover: 'Isaiah hears the question:


  "Whom shall I send?"


  And he answers:


  "Here am I; send me."


  This is not swagger.

  He has just been humbled.

  He has seen his own uncleanness.


  But humility does not become hiding.


  Once he is called, he steps forward.


  There is a moment when readiness is not a feeling.

  It is an answer.


  Say it plainly:

  here I am.'
