message: 'Proverbs says:'
hook: 'Proverbs says:'
voiceover: 'Proverbs says:


  "Through wisdom is an house builded; and by understanding it is established."


  Wisdom is not just having thoughts.

  It is building something that can stand.


  A home.

  A character.

  A way of speaking.

  A pattern of choices.


  Impulse can decorate a life.

  Wisdom builds one.


  If the house keeps falling, examine the foundation.'
final_line: If the house keeps falling, examine the foundation.
