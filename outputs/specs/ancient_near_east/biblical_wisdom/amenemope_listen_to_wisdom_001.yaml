message: The Egyptian wisdom of Amenemope begins with the posture of listening.
hook: The Egyptian wisdom of Amenemope begins with the posture of listening.
voiceover: 'The Egyptian wisdom of Amenemope begins with the posture of listening.


  Give the ear.

  Give the heart.

  Learn to understand.


  Wisdom does not enter a clenched person.


  It enters through attention,

  humility,

  and the willingness to be corrected.


  The proud man hears only interruption.

  The teachable person hears rescue.


  If you cannot listen, you cannot be formed.'
final_line: If you cannot listen, you cannot be formed.
