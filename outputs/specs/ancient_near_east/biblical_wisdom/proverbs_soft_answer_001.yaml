voiceover: 'Proverbs says:


  "A soft answer turneth away wrath: but grievous words stir up anger."


  This is not cowardice.

  It is command.


  Anyone can throw fuel.

  Anyone can answer heat with heat.

  Anyone can make the room worse.


  The harder strength is measured speech when pride wants a sharper blade.


  Do not confuse escalation with courage.


  Sometimes the strongest answer lowers the fire.'
