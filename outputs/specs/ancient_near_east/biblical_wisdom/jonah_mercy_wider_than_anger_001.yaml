message: Jonah wanted judgment.
hook: Jonah wanted judgment.
voiceover: 'Jonah wanted judgment.


  At the end, God asks:


  "Should not I spare Nineveh, that great city?"


  The question cuts deeper than Jonah''s anger.


  He wanted the guilty punished.

  He did not want them spared.


  That is the hard place in the heart:

  when justice becomes hunger for destruction.


  Mercy does not deny evil.

  But it refuses to let your anger become the measure of the world.'
final_line: But it refuses to let your anger become the measure of the world.
