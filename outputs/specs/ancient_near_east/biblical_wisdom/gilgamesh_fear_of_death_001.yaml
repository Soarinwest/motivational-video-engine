message: After Enkidu dies, Gilgamesh is no longer only a king.
hook: After Enkidu dies, Gilgamesh is no longer only a king.
voiceover: 'After Enkidu dies, Gilgamesh is no longer only a king.


  He is a man afraid of death.


  His walls, strength, and fame cannot answer the grave.


  That is the ancient wound:

  the powerful discover they are mortal too.


  Grief strips the crown down to the skull beneath it.


  The lesson is not to despise greatness.


  It is to know what greatness cannot save you from.


  Death humbles every throne.'
final_line: Death humbles every throne.
