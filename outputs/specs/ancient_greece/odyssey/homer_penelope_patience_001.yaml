message: Penelope is alone in the great house.
hook: Penelope is alone in the great house.
voiceover: "Penelope is alone in the great house.\nTwenty years. Odysseus is gone.\n\nThe suitors crowd her halls every day,\n\
  demanding she remarry.\n\nShe says yes.\nAfter I finish weaving this burial shroud for Laertes.\n\nShe weaves it by day.\n\
  At night, by lamplight, she pulls every thread out.\n\nThe waiting wife is not a backdrop.\nShe is the second hero of the\
  \ epic \u2014\n\noutlasting twenty years by refusing\nevery easy answer they offered her.\n\nShe held the house\nby holding\
  \ her own hand back."
final_line: by holding her own hand back.
