message: In Book IX of the Odyssey, trapped in the Cyclops's cave, Odysseus does not try to win by force.
hook: In Book IX of the Odyssey, trapped in the Cyclops's cave, Odysseus does not try to win by force.
voiceover: 'In Book IX of the Odyssey, trapped in the Cyclops''s cave, Odysseus does not try to win by force.


  He survives by silence, by timing, and by a false name.


  Asked his name, he says:

  "Noman."


  Then he blinds Polyphemus in his sleep

  and escapes under the bellies of the sheep.


  He lives because he was no one.


  Then, sailing away, he cannot help himself.

  He shouts his real name across the water.


  Polyphemus hears it. Calls down a curse.

  And every storm of the next ten years

  begins with a name spoken to the wind.


  Cunning saves you.

  Pride sells what cunning bought.


  Be no one first.'
final_line: Be no one first.
