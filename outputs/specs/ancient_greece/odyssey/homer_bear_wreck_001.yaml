message: 'Odysseus says in the Odyssey:'
hook: 'Odysseus says in the Odyssey:'
voiceover: 'Odysseus says in the Odyssey:


  "If some god wrecks me when I am on the sea, I will bear it and make the best of it."


  This is not optimism.

  It is endurance without theatre.


  He does not pretend the sea is gentle.

  He does not pretend fate is fair.

  He simply refuses to collapse before the storm arrives.


  There is dignity in meeting hardship plainly.


  Do not worship the wreck.

  Row through it.'
final_line: Row through it.
