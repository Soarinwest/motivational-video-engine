message: In Homer's Odyssey, Odysseus is offered ease, beauty, and escape.
hook: In Homer's Odyssey, Odysseus is offered ease, beauty, and escape.
voiceover: 'In Homer''s Odyssey, Odysseus is offered ease, beauty, and escape.

  Still he says:


  "Nevertheless, I want to get home, and can think of nothing else."


  This is not comfort speaking.

  It is purpose.


  A man can survive storms if he knows what shore he is trying to reach.

  Without that, every pleasure becomes a delay.


  Know your home.

  Know your aim.

  Then endure the sea between.'
final_line: Then endure the sea between.
