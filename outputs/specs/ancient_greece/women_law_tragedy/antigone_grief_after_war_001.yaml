voiceover: "In Sophocles' Antigone, before the burial, before the trial, Antigone tells her sister Ismene plainly what she\
  \ has already seen:\n\n\"Nothing painful is there, nothing fraught with ruin, no shame, no dishonour, that I have not seen.\"\
  \n\nShe is not boasting.\nShe is not asking for pity.\n\nShe is naming the cost out loud \u2014 and then paying it.\n\n\
  That is what a survivor does.\nCatalogue the ruin. Act anyway.\n\nShe knew. She did it anyway."
final_line: She knew. She did it anyway.
