message: In Plato's Republic, justice is not only about courts or cities.
hook: In Plato's Republic, justice is not only about courts or cities.
voiceover: 'In Plato''s Republic, justice is not only about courts or cities.

  It is about the soul.


  "Justice is the excellence of the soul."


  This means disorder inside you has consequences outside you.

  A divided person becomes easy to rule by appetite, fear, or praise.


  Put the inner city in order.

  Let reason command.

  Let courage serve.

  Let desire know its place.


  A disordered soul cannot build a worthy life.'
final_line: A disordered soul cannot build a worthy life.
