message: 'Aristotle, in the Nicomachean Ethics, does not treat virtue as a mood:'
hook: 'Aristotle, in the Nicomachean Ethics, does not treat virtue as a mood:'
voiceover: 'Aristotle, in the Nicomachean Ethics, does not treat virtue as a mood:


  "Moral virtue comes about as a result of habit."


  This means character is not what you claim under calm conditions.

  It is what repeated action has made automatic.


  You become just by doing justice.

  Disciplined by practicing restraint.

  Brave by meeting fear.


  Do not ask what kind of person you are.

  Watch what you repeatedly do.'
final_line: Watch what you repeatedly do.
