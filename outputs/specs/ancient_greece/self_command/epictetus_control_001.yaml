message: 'Epictetus begins the Enchiridion with a clean division:'
hook: 'Epictetus begins the Enchiridion with a clean division:'
voiceover: 'Epictetus begins the Enchiridion with a clean division:


  "Some things are in our control and others not."


  This means your first task is not to control the world.

  It is to stop surrendering command of yourself.


  Your opinion.

  Your desire.

  Your refusal.

  Your next action.


  Those are yours.


  Do not waste your strength arguing with what was never yours to command.'
final_line: Do not waste your strength arguing with what was never yours to command.
