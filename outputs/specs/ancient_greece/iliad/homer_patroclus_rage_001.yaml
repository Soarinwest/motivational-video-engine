message: In the Iliad, Achilles will not fight.
hook: In the Iliad, Achilles will not fight.
voiceover: 'In the Iliad, Achilles will not fight.

  Not for Agamemnon. Not for the spoils. Not for command.


  He stays in his tent. He sulks.

  The Greeks die in the surf for it.


  Then word comes:

  Patroclus is dead. Hector killed him.


  The same man who would not move for an order

  is on his feet before the messenger finishes.


  Pride kept him in. Grief took him out.


  Some withdrawals only end at a loss

  the man cannot ignore.


  Not honor.

  Grief.'
final_line: Grief.
