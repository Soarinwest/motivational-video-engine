voiceover: "In the Iliad, Book VI, Hector says goodbye to his wife and infant son\nat the gates of Troy.\n\nThe child cries\
  \ at the bronze helmet \u2014\nthe gleaming crest, the warrior's mask of war.\n\nSo Hector takes it off.\nHe kisses the\
  \ boy. He prays for him.\n\nThen he puts the helmet back on\nand walks toward the man who will kill him.\n\nHonor is what\
  \ you do for the people who would still keep you home.\n\nHe set the helmet down.\nThen he went."
final_line: Then he went.
