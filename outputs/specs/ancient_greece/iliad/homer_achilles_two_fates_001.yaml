hook: 'In Book IX of the Iliad, the embassy comes to Achilles to ask him back to the war. He tells them what his mother told
  him:'
voiceover: 'In Book IX of the Iliad, the embassy comes to Achilles to ask him back to the war. He tells them what his mother
  told him:


  "If I stay here and fight, I shall not return alive but my name will live for ever. Whereas if I go home my name will die,
  but it will be long ere death shall take me."


  Every man gets that trade.

  Most spend their lives pretending it is not on the table.


  Achilles is the one who says it out loud.


  He named the trade.'
final_line: He named the trade.
