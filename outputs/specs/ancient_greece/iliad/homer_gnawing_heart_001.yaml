message: In Book XXIV of the Iliad, Achilles has killed Hector and cannot stop.
hook: In Book XXIV of the Iliad, Achilles has killed Hector and cannot stop.
voiceover: 'In Book XXIV of the Iliad, Achilles has killed Hector and cannot stop.


  For twelve days he drags the body. No food. No sleep.


  His mother Thetis comes from the sea, and she names what he is doing to himself:


  "My son, how long are you going to eat your own heart out in lamentation?"


  She is not telling him his grief is wrong.


  She is telling him that grief, past its hour, becomes another way of dying.


  The mother in the room sees it before the son does.


  Eating your own heart out.'
final_line: Eating your own heart out.
