hook: In Book XVIII of the Iliad, Antilochus runs across the Greek camp to the tent he does not want to enter.
voiceover: 'In Book XVIII of the Iliad, Antilochus runs across the Greek camp to the tent he does not want to enter.


  He delivers six words:


  "Patroclus has fallen, and they are fighting around his body."


  Achilles has refused embassy, gifts, reason.


  Pride could not move him.

  Grief did.


  The cost of a man''s pride is paid by the people he loves.


  The pride that kept him in the tent could not be moved by any argument.


  Only by a corpse.'
final_line: Only by a corpse.
