message: The first words of the Iliad are not about glory, courage, or victory.
hook: The first words of the Iliad are not about glory, courage, or victory.
voiceover: "The first words of the Iliad are not about glory, courage, or victory.\n\nThe poet invokes the Muse with one subject:\n\
  \n\"Sing, O goddess, the anger of Achilles, son of Peleus, that brought countless ills upon the Achaeans.\"\n\nAnger is\
  \ the first word of Western literature.\n\nEverything that follows \u2014 the quarrel, the withdrawal, the dead friend,\
  \ the dragged body \u2014 is the receipt.\n\nA great man's anger is rarely his own.\nIt leaks out of his life into the lives\
  \ of the people who depend on him.\n\nAnd what it cost."
final_line: And what it cost.
