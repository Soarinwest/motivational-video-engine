message: 'In the Iliad, Nestor pleads for peace between Agamemnon and Achilles:'
hook: 'In the Iliad, Nestor pleads for peace between Agamemnon and Achilles:'
voiceover: 'In the Iliad, Nestor pleads for peace between Agamemnon and Achilles:


  "End this quarrel with Achilles."


  He is not asking them to become weak.

  He is asking them to see consequence before consequence arrives.


  Some conflicts are not worth the victory.

  Some arguments become storms because no one will step back first.


  Honor without restraint becomes hunger.

  Pride without wisdom becomes damage.


  Win yourself before you try to win the room.'
final_line: Win yourself before you try to win the room.
