hook: In Book III of the Iliad, Priam asks Helen to identify the Greek champions in the field below the walls of Troy.
voiceover: 'In Book III of the Iliad, Priam asks Helen to identify the Greek champions in the field below the walls of Troy.


  She begins not with the warriors but with herself:


  "Would that I had chosen death rather than to have come here with your son. I am hateful of all men."


  The Iliad neither punishes her nor exempts her.


  It lets her grieve out loud, in full view of the war her presence still funds.


  The most honest grief is the kind that does not look for someone else to blame.


  She named it before anyone else did.'
final_line: She named it before anyone else did.
