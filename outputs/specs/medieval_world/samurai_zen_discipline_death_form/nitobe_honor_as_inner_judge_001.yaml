message: In Nitobe's account of Bushido, honor is not just public reputation.
hook: In Nitobe's account of Bushido, honor is not just public reputation.
voiceover: 'In Nitobe''s account of Bushido, honor is not just public reputation.


  It is "a vivid consciousness of personal dignity and worth."


  That means the first witness is inside you.


  You may hide a compromise from others.

  You may explain it well.

  You may even be praised for it.


  But the inner judge remains.


  Honor begins where performance ends.


  Do not become someone you have to explain away.'
final_line: Do not become someone you have to explain away.
