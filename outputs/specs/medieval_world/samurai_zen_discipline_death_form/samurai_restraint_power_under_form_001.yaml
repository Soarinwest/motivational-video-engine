message: The sword is not the lesson by itself.
hook: The sword is not the lesson by itself.
voiceover: 'The sword is not the lesson by itself.


  The lesson is form.


  How you stand.

  How you breathe.

  How you act before fear makes demands.


  Power without form becomes panic.

  Skill without restraint becomes vanity.

  Discipline without humility becomes another mask.


  The mature person does not become harmless.

  He becomes governed.


  Strength is not enough.


  Strength must learn its shape.'
final_line: Strength must learn its shape.
