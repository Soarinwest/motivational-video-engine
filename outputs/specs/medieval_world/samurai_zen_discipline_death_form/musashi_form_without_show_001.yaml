id: musashi_form_without_show_001
series: literary_dark
author: Miyamoto Musashi (Five Rings)
theme: restraint
duration_seconds: 30
message: Musashi's discipline is not theatrical.
hook: Musashi's discipline is not theatrical.
voiceover: 'Musashi''s discipline is not theatrical.


  The trained person does not need to look dangerous.

  He does not need to signal mastery.

  He does not tighten into a costume of seriousness.


  True form becomes ordinary.

  The body moves cleanly.

  The mind does not beg to be seen.


  This is the harder lesson:

  do the work until you no longer need to perform the work.


  Mastery has no need to pose.'
final_line: Mastery has no need to pose.
