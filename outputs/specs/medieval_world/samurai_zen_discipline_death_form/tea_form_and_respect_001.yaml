theme: restraint
duration_seconds: 30
message: Not all discipline looks like battle.
hook: Not all discipline looks like battle.
voiceover: 'Not all discipline looks like battle.


  Sometimes it is a bowl.

  A room.

  A gesture done correctly when no one is impressed.


  Tea practice teaches that form can train the heart.


  The small act becomes a mirror:

  are you rushing?

  are you careless?

  are you trying to dominate even silence?


  Do ordinary things cleanly.


  The way you hold the bowl is also the way you hold the world.'
final_line: The way you hold the bowl is also the way you hold the world.
