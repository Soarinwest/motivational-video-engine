message: 'In Bushido: The Soul of Japan, Inazo Nitobe defines rectitude this way:'
hook: 'In Bushido: The Soul of Japan, Inazo Nitobe defines rectitude this way:'
voiceover: 'In Bushido: The Soul of Japan, Inazo Nitobe defines rectitude this way:


  "Rectitude is the power of deciding upon a certain course of conduct in accordance with reason, without wavering."


  This is not stubbornness.

  It is clean moral movement.


  Think carefully.

  See clearly.

  Then stop bargaining with yourself.


  A crooked life is often built from small delays before obvious duties.


  When the path is straight, walk it.'
final_line: When the path is straight, walk it.
