message: 'Nitobe''s Bushido does not treat courage as noise or appetite for danger:'
hook: 'Nitobe''s Bushido does not treat courage as noise or appetite for danger:'
voiceover: 'Nitobe''s Bushido does not treat courage as noise or appetite for danger:


  "Courage is doing what is right."


  That is the line that matters.


  Recklessness is easy.

  Anger is easy.

  Throwing yourself at danger can still be vanity.


  Courage becomes virtue only when it serves the right thing.


  Before you call yourself brave, ask what your bravery is protecting.


  Risk is not enough.

  Right action is.'
final_line: Right action is.
