voiceover: "Hagakure gives one of the severest samurai teachings:\n\nthe way is found in death.\n\nDo not read that as a hunger\
  \ to die.\nRead it as training against panic.\n\nA person who refuses to think about death becomes ruled by fear when death\
  \ enters the room.\n\nDeath-awareness cuts through vanity.\nIt cuts through delay.\nIt asks what matters now.\n\nRemember\
  \ death, not to worship it \u2014\n\nbut to stop being owned by it."
