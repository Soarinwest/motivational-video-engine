message: "In the H\xE1vam\xE1l, the old northern wisdom says:"
hook: "In the H\xE1vam\xE1l, the old northern wisdom says:"
voiceover: "In the H\xE1vam\xE1l, the old northern wisdom says:\n\n\"Cattle die, and kinsmen die; thyself too soon must die.\
  \ But one thing never will die \u2014 fair fame of one who has earned.\"\n\nThis is not vanity.\nIt is responsibility.\n\
  \nYour body ends.\nYour comfort ends.\nYour excuses end.\n\nWhat remains is the shape of your deeds in other people's memory.\n\
  \nLive so that death does not erase you."
final_line: Live so that death does not erase you.
