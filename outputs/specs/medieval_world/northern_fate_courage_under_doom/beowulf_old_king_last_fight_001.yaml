message: 'In the final part of Beowulf, the king is old, but the dragon still has to be faced:'
hook: 'In the final part of Beowulf, the king is old, but the dragon still has to be faced:'
voiceover: 'In the final part of Beowulf, the king is old, but the dragon still has to be faced:


  "I risked my life often when I was young. Now I am old."


  This is the hard dignity of age.

  Strength fades.

  Death approaches.

  Responsibility does not vanish with either.


  He does not confuse age with exemption.


  The worthy question is not whether you are still young.


  It is whether you still stand when duty calls.'
final_line: It is whether you still stand when duty calls.
