voiceover: "In the H\xE1vam\xE1l, Odin describes the price he paid for wisdom:\n\n\"I hung on a wind-rocked tree nine whole\
  \ nights, with a spear wounded, and to Odin offered, myself to myself.\"\n\nWisdom here is not soft.\nIt is not downloaded.\n\
  It is not given to the comfortable.\n\nTo see more, you usually have to lose something:\npride,\nease,\nillusion,\nsometimes\
  \ even the person you were.\n\nReal understanding has a price.\n\nIf your knowledge costs you nothing, it may be worth the\
  \ same."
