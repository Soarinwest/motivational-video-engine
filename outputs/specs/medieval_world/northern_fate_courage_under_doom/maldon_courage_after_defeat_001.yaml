hook: 'In The Battle of Maldon, after disaster has already come, Byrhtwold says:'
voiceover: "In The Battle of Maldon, after disaster has already come, Byrhtwold says:\n\n\"Will shall be the sterner, heart\
  \ the bolder, spirit the greater as our strength lessens.\"\n\nThat is the northern ethic in one stroke.\n\nCourage is not\
  \ confidence in victory.\nIt is refusal to collapse when victory is slipping away.\n\nWhen the numbers turn,\nwhen the leader\
  \ falls,\nwhen the ending darkens \u2014\n\nthat is when character is seen.\n\nStand harder when hope gets thinner."
final_line: Stand harder when hope gets thinner.
