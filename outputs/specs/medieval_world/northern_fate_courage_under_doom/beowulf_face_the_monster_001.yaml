message: In Beowulf, the hero does not ask for a guarantee before entering the hall.
hook: In Beowulf, the hero does not ask for a guarantee before entering the hall.
voiceover: 'In Beowulf, the hero does not ask for a guarantee before entering the hall.


  He commits himself:


  "I shall fulfil that purpose."


  This is not recklessness for applause.

  It is courage aimed at what is devouring the people around him.


  Every age has its monster.

  Fear.

  Vice.

  Chaos.

  Cowardice.


  At some point, a person has to stop talking about it and step inside.'
final_line: At some point, a person has to stop talking about it and step inside.
