# Field notes — observational, no author, resilience after disturbance.
id: field_notes_resilience_001
series: field_notes
author: null
theme: resilience
duration_seconds: 25
message: A forest after fire is not destroyed. It is starting.
hook: Walk a burned ridge a year after the fire.
voiceover: |
  Walk a burned ridge a year after the fire.
  The trunks are black. The ground is open.
  But under the ash, new green is pushing up faster
  than anywhere else on the mountain.
  Disturbance is not the end of growth.
  It is the condition for it.
final_line: Your hard year is doing the same work.

