id: epictetus_freedom_001
series: stoic_practice
author: Epictetus
theme: inner-freedom
duration_seconds: 30
message: Freedom is not the absence of constraint. It is the right relationship to what you cannot control.
hook: A slave taught Rome what freedom is.
voiceover: "A slave taught Rome what freedom is.\nEpictetus was lame, owned, and exiled \u2014\nand he told the empire's free\
  \ men they were captives of their own appetites.\nFreedom, he said, is not the absence of constraint.\nIt is the right relationship\
  \ to what you cannot control.\nDrop what is not yours. Carry only what is.\n"
final_line: That is the only freedom no one can take.
