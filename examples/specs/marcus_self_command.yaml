id: marcus_self_command_001
series: stoic_practice
author: Marcus Aurelius
theme: self-command
duration_seconds: 35
message: The first work of the day is governing yourself.
hook: Before you give a single order to the world, give one to yourself.
voiceover: "Before you give a single order to the world, give one to yourself.\nNo one rules a household, a craft, or a country\n\
  without first ruling his own attention, his own appetite, his own mouth.\nMarcus Aurelius wrote his notes alone, at night,\
  \ by lamplight \u2014\nnot to instruct anyone else.\nHe was instructing the only man he could.\n"
final_line: Begin where he began. Govern yourself.
