publishing_order_rationale: >
  Self-command first establishes the moral grammar of the season:
  examination, control, habit, order, choice. The Iliad arc then
  shows what happens when self-command fails — pride and grief in
  the most expensive currency. The Odyssey arc is the long discipline
  of the return: cunning over strength, patience as resistance,
  mortality as the price of meaning. Antigone closes the season with
  conscience under pressure, owned without performance.

review_rules:
  - verify_translation_rights
  - verify_quote_wording
  - distinguish_quote_from_interpretation
  - human_review_before_publish

cadence_notes: >
  Cadence TBD. Suggested: one video per week, full season runs
  ~12 weeks. Reorder only if a translation verification blocks
  the originally-scheduled script.
