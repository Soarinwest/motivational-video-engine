arc_id: ancient_rome_power_empire_corruption
region: ancient_rome
title: "Ancient Rome: Power, Empire, and Corruption"

purpose: >
  The darker political arc. Rome on power: what it costs to hold, what
  it costs to refuse, what it costs to be held by it. Cincinnatus
  returning to the plow, Caesar at the Rubicon, Brutus choosing the
  Republic over blood, Tacitus naming the desert that empire calls
  peace, Sallust on the rot beneath. The cost of public virtue and the
  faces of its absence.

  Frame carefully — see ../03_CONTENT_ETHICS.md. The arc honors public
  virtue without flattering empire, names tyranny without modern
  political grievance, treats ambition as serious moral territory.

visual_world: stoic_rome
default_visual_motifs:
  - "small Roman field at sunrise, plow, messengers approaching"
  - "horseback at the edge of a narrow river at night, legions waiting"
  - "shadowed Roman chamber, dagger on marble, ancestor busts"
  - "ruined arches at dusk, distant soldiers across a barren landscape"
  - "decaying Roman banquet hall after midnight, overturned cups"

tone:
  - severe
  - cinematic
  - cold
  - observant
  - mournful

themes:
  - ambition
  - public_virtue
  - corruption
  - tyranny
  - reputation
  - power
  - decay
  - honor

