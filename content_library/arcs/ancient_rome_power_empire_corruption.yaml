publishing_notes: >
  Publish in narrative order: virtue (Cincinnatus), ambition (Caesar),
  conflict (Brutus), critique (Tacitus), decay (Sallust). The arc is
  cold and observant — somber_cinematic across the board. Voice
  classical_male (bm_george) for the historians; literary_male
  (bm_lewis) for Brutus interior moments. Watch the ethics frame:
  honor public virtue, name tyranny, never celebrate violence.

review_rules:
