arc_id: ancient_greece_heroic_myth
region: ancient_greece
title: "Ancient Greece: The Heroic Myths"

purpose: >
  The mythic-tradition heroes — Heracles, Theseus, Jason, Perseus,
  Bellerophon. The labors that test, the monsters that mirror, the
  wisdom won by surviving what should have killed you. Mythic but
  grounded: not fantasy, not action — moral instruction by image.

visual_world: mythic
default_visual_motifs:
  - "a powerful weary figure carrying a heavy burden up a rocky path at dawn"
  - "a labyrinth corridor in dim torchlight"
  - "a Bronze-age warrior facing a coiled serpent at the edge of a pool"
  - "a single ship rowing across a still sea at dawn"
  - "winged figure plummeting toward a sunlit sea"

tone:
  - mythic
  - severe
  - elegiac
  - heroic

themes:
  - courage
  - self_command
  - mortality
  - honor_service
  - suffering
  - homefront_rebuilding

