publishing_notes: >
  Pairs with the Odyssey arc — both are about the long endurance
  of the long return. Heracles and Sisyphus also speak to existential
  themes (Camus on Sisyphus), so cross-tag accordingly.

  Avoid the fantasy-action trap. These myths are moral instruction
  by image, not adventure stories. Hercules's labors are the work
  of atonement, not a power-fantasy.

review_rules:
  - verify_translation_rights
  - verify_quote_wording
  - distinguish_quote_from_interpretation
  - avoid_fantasy_action_framing
  - human_review_before_publish

status: drafted
