publishing_notes: >
  These are the easiest Greek-myth videos to misframe. The temptation
  is to treat them as cautionary tales with simple morals ("don't
  fly too high"). They are richer than that — they're about the
  forms of human longing that cannot be unmade.

  Pairs with existential traditions (Camus on Sisyphus, Kierkegaard
  on Abraham). Persephone material pairs with women_law_tragedy
  through Hecuba and Andromache — both are stories of women whose
  grief shapes the world after.

review_rules:
