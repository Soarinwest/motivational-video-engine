arc_id: ancient_greece_olympian_myth
region: ancient_greece
title: "Ancient Greece: The Olympian Myths"

purpose: >
  The myths in which gods and mortals collide, and the price is
  always paid by the mortal. Prometheus stealing fire and being
  chained for it. Persephone taken to the underworld and the
  seasons born from her absence. Orpheus refusing to trust the
  silence behind him and losing her again. Icarus flying too high.
  These are not adventures — they are diagnoses of the human
  tendencies that always cost us.

visual_world: mythic
