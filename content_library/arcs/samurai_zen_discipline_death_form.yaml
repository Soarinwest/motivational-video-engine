arc_id: samurai_zen_discipline_death_form
region: medieval_world
title: "The Samurai / Zen Arc: Discipline, Death, and Form"

purpose: >
  Disciplined form under mortality. Bushido, samurai strategy, Zen practice,
  death-awareness, and ritual form converge to show that strength must be
  governed by restraint, attention, and humility.

core_thesis: >
  The mature person is not merely intense, dangerous, or brave. He is
  formed: able to decide cleanly, act precisely, face death without panic,
  practice without performance, and carry strength without vanity.

visual_world: samurai_zen

default_visual_motifs:
  - "lone samurai on a stone path at dawn"
  - "samurai before an open gate in rain"
  - "samurai kneeling before a polished blade in candlelight"
  - "swordsman repeating cuts in an empty dojo"
  - "armor beside a low candle before dawn"
  - "empty Zen temple gate in mist"
  - "monk seated before a raked stone garden"
  - "hands holding a tea bowl in a tatami room"

tone:
  - severe
  - still
  - disciplined
  - elegiac
  - restrained
  - contemplative

themes:
  - duty
  - mortality
  - restraint
  - self_command
  - honor_service
  - courage
  - wisdom

