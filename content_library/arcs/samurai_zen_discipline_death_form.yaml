publishing_order_logic: >
  Begin with Bushido's explicit moral virtues (rectitude, courage, honor),
  then move into Musashi's practice and form (the Way is practice; form
  without show), then Hagakure's death-awareness, then Zen's perception
  and attention (the gateless gate; empty mind), then close by synthesizing
  strength under disciplined form via tea practice and the closing
  synthesis.

review_rules:
  - verify_public_domain_translation_before_direct_quote
  - avoid_fake_samurai_quotes
  - distinguish_bushido_history_from_later_romanticization
  - avoid_violence_fantasy
  - avoid_katana_aesthetic_without_moral_substance
  - preserve_restraint_and_form
  - human_review_before_publish
