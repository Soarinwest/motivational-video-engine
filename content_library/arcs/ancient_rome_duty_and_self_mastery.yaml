publishing_notes: >
  Open Season 02 with this arc. The progression from Greece is:
  Socrates examined → Aristotle trained → Epictetus controlled →
  Marcus did his duty → Seneca stopped wasting life → Cicero served
  what is right. Pair with somber_cinematic for mortality pieces
  (depart this moment, life is long enough) and ancient_low_drone
  for the daily-practice pieces.

