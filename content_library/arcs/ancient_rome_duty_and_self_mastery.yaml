arc_id: ancient_rome_duty_and_self_mastery
region: ancient_rome
title: "Ancient Rome: Duty and Self-Mastery"

purpose: >
  The strongest motive-engine fit. Rome teaches what Greece prepared for:
  do your duty, master luxury, face death, serve something larger than
  comfort, carry responsibility without complaint. Marcus on the morning
  and the next act, Seneca on time and imagined suffering, Cicero on
  duty over advantage. Stoic practice under empire weight.

  This is the umbrella arc. ancient_rome_stoic_discipline (Marcus
  Book II) and ancient_rome_seneca_on_time are feeder sub-arcs already
  in production; their scripts belong to this season as well.

visual_world: stoic_rome
default_visual_motifs:
  - "Roman writing desk, oil lamp, scrolls, rain beyond"
  - "Senate steps in cold rain, bronze doors closed"
  - "Roman forum at first light, empty colonnade"
  - "marble study, water clock, parchment in sunlight"
  - "campaign tent on the Danube frontier, single lamp burning"

