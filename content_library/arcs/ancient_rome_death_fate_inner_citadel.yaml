publishing_notes: >
  Close Season 02 with this arc. Pair every script with somber_cinematic
  music. Voice classical_male (bm_george) for Marcus/Seneca/Lucretius;
  literary_male (bm_lewis) for Virgil (the epic register). The arc must
  earn its mortality material by being unsentimental — no false comfort,
  no nihilist pose. Stoic acceptance and epic burden, not despair.

