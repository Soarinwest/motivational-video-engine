arc_id: ancient_rome_death_fate_inner_citadel
region: ancient_rome
title: "Ancient Rome: Death, Fate, and the Inner Citadel"

purpose: >
  Where Rome becomes cinematic and heavy. Marcus on impermanence and
  the citadel within. Seneca on death always present. Lucretius on
  the fear that poisons life. Virgil on the cost of founding a destiny.
  The arc earns its weight by refusing consolation — death is named,
  fate is met, the inner citadel is the only sovereignty left.

visual_world: stoic_rome
default_visual_motifs:
  - "funeral pyre at dusk, smoke rising into storm gray sky"
  - "dark stone chamber, faint golden light outlining a face in meditation"
  - "burning Troy, a man carrying his father through the night"
  - "dark Italian shoreline at dawn, Trojan ships behind, sword lowered"
  - "vast night sky outside Rome, stars above ruins, oil lamp in hand"

tone:
  - severe
  - elegiac
  - mournful
  - philosophical
  - restrained

themes:
  - mortality
  - fate
  - impermanence
  - grief
  - acceptance
  - legacy
  - nature

