publishing_order_logic: >
  The arc begins with mortality and reputation (Hávamál), moves into
  restraint and the cost of wisdom (silence; Odin's ordeal), expands into
  prophecy and cosmic doom (Völuspá, Ragnarök), then descends into human
  courage (Beowulf at Heorot), aging duty (the dragon fight), exile (the
  Wanderer), sea-hardship (the Seafarer), and loyalty after defeat (Maldon).

