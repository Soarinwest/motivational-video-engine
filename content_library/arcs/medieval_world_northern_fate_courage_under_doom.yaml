arc_id: medieval_world_northern_fate_courage_under_doom
region: medieval_world
title: "Northern Fate: Courage Under Doom"

purpose: >
  Northern heroic and elegiac literature does not promise success. It asks
  what kind of person remains upright under mortality, exile, doom, grief,
  and defeat. This arc explores what remains when comfort, certainty, and
  control fall away.

core_thesis: >
  Death is certain, fate is not fully controllable, and even the mighty fall.
  The moral task is not to escape the ending, but to meet it with courage,
  restraint, loyalty, and memory.

visual_world: northern_fate

