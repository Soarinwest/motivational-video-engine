arc_id: ancient_greece_odyssey
region: ancient_greece
title: "Ancient Greece: The Odyssey"

purpose: >
  Homer's Odyssey as long-form discipline: the return is the work,
  not the war. Cunning over strength, patience as resistance, mortality
  as the price of meaning, the descent that buys the homecoming.
  The hero is matched at home by the wife who outlasted him.

visual_world: mythic
default_visual_motifs:
  - "shoreline at dawn, ship silhouette"
  - "broken mast, dark sea, dawn line"
  - "cloaked figure on cliffs above dark sea"
  - "ancient Greek interior, woman by window, oil lamp, sea beyond"
  - "glowing cave mouth in a dark canyon"
  - "misty grey shoreline with a ruined stone gateway"

tone:
  - elegiac
  - severe
  - restrained
  - longing

themes:
  - duty
  - homefront_rebuilding
  - restraint
  - courage
  - suffering
  - grief
  - mortality
  - self_command
  - women_and_war

primary_sources:
