publishing_notes: >
  Publish roughly in narrative order: the want of home (008), Polyphemus
  cunning (014), Calypso refusal (015), the underworld (017), Penelope's
  patience at home (016), bear the wreck (009). The Odyssey arc is
  longer-form discipline than the Iliad's — slower beats, more interiors.

review_rules:
