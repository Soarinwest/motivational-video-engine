  - homer_odyssey_suffered_much
  - homer_odyssey_want_home
  - homer_odyssey_bear_it
  - homer_odyssey_polyphemus_cunning
  - homer_odyssey_calypso_refuse
  - homer_odyssey_penelope_patience
  - homer_odyssey_tiresias_underworld

