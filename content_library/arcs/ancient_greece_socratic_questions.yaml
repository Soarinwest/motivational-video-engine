arc_id: ancient_greece_socratic_questions
region: ancient_greece
title: "Ancient Greece: The Socratic Questions"

purpose: >
  Socrates the gadfly — the man who asked the questions Athens
  preferred not to answer, and was killed for it. The arc treats
  the Apology, the Crito, and the Phaedo as one long meditation on
  what it costs to live by examination, and what it costs to die
  for it. Plato wrote it down; Socrates lived it.

visual_world: ancient_greece
default_visual_motifs:
  - "Athenian agora at dusk, columns silhouetted against fading sky"
  - "empty Athenian courtroom, columns in early shadow"
  - "a sparse prison cell in late afternoon, light through high window"
  - "olive grove path at golden hour"

tone:
  - severe
  - direct
  - elegiac
  - philosophical

