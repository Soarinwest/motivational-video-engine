publishing_order_logic: >
  Begin by stripping illusions of permanence (Ecclesiastes). Move into
  timing, suffering, and the limits of human understanding (Job). Then
  rebuild with Proverbs: wisdom builds, pride falls. Move into temptation
  (Cain), endurance (Psalm 23), renewal (Isaiah), mortality (Gilgamesh),
  and teachability (Amenemope).

review_rules:
