arc_id: ancient_near_east_biblical_wisdom
region: ancient_near_east
title: "Ancient Near East & Biblical Wisdom: Exile, Judgment, and the Heart"

purpose: >
  This arc explores mortality, pride, suffering, wisdom, humility, exile,
  grief, temptation, justice, mercy, and endurance through Biblical
  wisdom, prophecy, poetry, and ancient Near Eastern literature. Not
  "religious content" in a shallow sense — wisdom under pressure.

core_thesis: >
  Human beings are limited, mortal, tempted, and often proud. Wisdom
  begins when the heart becomes teachable, when suffering humbles false
  certainty, and when strength is joined to mercy, patience, and
  reverence.

