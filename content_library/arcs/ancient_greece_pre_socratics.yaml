arc_id: ancient_greece_pre_socratics
region: ancient_greece
title: "Ancient Greece: The Pre-Socratics"

purpose: >
  Before Socrates asked what justice was, others asked what anything
  was. Heraclitus on the river that is never the same. Parmenides on
  what is and what isn't. Pythagoras on the harmony beneath the noise.
  Anaximander on the unbounded. These are the first ideas — terse,
  severe, almost koan-like. Short videos that lean on a single
  fragment.

visual_world: ancient_greece
default_visual_motifs:
  - "a still mountain stream at dawn, light moving on water"
  - "a single column of cracked marble in a field of dust"
  - "a starlit night over the Aegean, perfect silence"
  - "a fire on a hearth at night, watched by no one"

