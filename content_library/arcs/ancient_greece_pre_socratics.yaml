publishing_notes: >
  Pre-Socratics work well as the SHORTEST videos in the project —
  20-25 seconds is plenty. A fragment, a beat, a one-line interpretation.
  Closer to a koan than to a stoic exhortation.

  Heraclitus's "war is the father of all things" must be framed
  carefully. He does NOT mean war is good. He means strife — the
  collision of opposites — is what generates form. Misreading it
  as militarism is the failure state.

review_rules:
  - verify_translation_rights
  - verify_quote_wording
  - distinguish_quote_from_interpretation
  - avoid_militarism_misreading
  - human_review_before_publish

