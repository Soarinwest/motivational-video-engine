arc_id: ancient_greece_greek_tragedy
region: ancient_greece
title: "Ancient Greece: The Tragic Stage"

purpose: >
  Greek tragedy as moral instruction. The collision of human will and
  consequence — Oedipus chasing the truth that destroys him, Antigone
  burying her brother against the king's decree, the Trojan women
  picked over after a city falls. Aeschylus, Sophocles, Euripides.
  The form Shakespeare and Dostoevsky inherit.

visual_world: ancient_greece
default_visual_motifs:
  - "an ancient Greek amphitheater at dusk, empty stone tiers, distant mountains"
  - "a cracked theater mask on a marble stage, single shaft of cold light"
  - "a ruined courtyard at dawn, ash drifting, a woman seated alone"
  - "the walls of a fallen city, smoke, women and children walking away"

tone:
  - severe
  - mournful
  - inevitable
  - tragic

themes:
  - mortality
  - ambition
  - power_corruption
  - grief
  - women_and_war
  - homefront_rebuilding
  - duty
  - honor_service

