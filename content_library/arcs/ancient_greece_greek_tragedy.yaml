publishing_notes: >
  Pairs naturally with the Iliad arc (Trojan Women picks up where the
  Iliad ends — the city falls, the women are taken). Antigone closes
  ancient Season 01; Oedipus and the Trojan Women can anchor a later
  full-tragedy season. Treat the women_and_war frame carefully — the
  Trojan women are the subject, not the backdrop.

