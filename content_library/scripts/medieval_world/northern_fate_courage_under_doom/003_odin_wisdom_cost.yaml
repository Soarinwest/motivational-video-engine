script: |
  In the Hávamál, Odin describes the price he paid for wisdom:

  "I hung on a wind-rocked tree nine whole nights, with a spear wounded, and to Odin offered, myself to myself."

  Wisdom here is not soft.
  It is not downloaded.
  It is not given to the comfortable.

  To see more, you usually have to lose something:
  pride,
  ease,
  illusion,
  sometimes even the person you were.

  Real understanding has a price.

  If your knowledge costs you nothing, it may be worth the same.

