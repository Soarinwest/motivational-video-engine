script: |
  The Hávamál warns against loose certainty:

  "The unwise man thinks that he knows all."

  This is the old lesson.
  Noise is not wisdom.
  Boasting is not strength.
  Speaking first is not the same as seeing clearly.

  A foolish man feels tallest where he is never tested.
  A wise man learns caution, silence, and measure.

  Do not rush to prove yourself with words.

  Let reality examine you first.

