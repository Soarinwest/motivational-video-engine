scene_context: >
  The Hávamál turns from the mortality of possessions, kin, and the self
  toward the one thing that may remain after death: earned reputation.

script: |
  In the Hávamál, the old northern wisdom says:

  "Cattle die, and kinsmen die; thyself too soon must die. But one thing never will die — fair fame of one who has earned."

  This is not vanity.
  It is responsibility.

  Your body ends.
  Your comfort ends.
  Your excuses end.

  What remains is the shape of your deeds in other people's memory.

  Live so that death does not erase you.

