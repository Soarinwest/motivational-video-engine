script: |
  In the Völuspá, the seeress describes Ragnarök, when the world itself breaks:

  "The sun turns black, earth sinks in the sea."

  That is the northern hard truth.
  Not even the gods are promised escape.

  But the lesson is not despair.
  It is courage.

  If even the highest must fall, dignity does not come from winning forever.

  It comes from standing your ground when the sky itself is burning.

  Stand anyway.

