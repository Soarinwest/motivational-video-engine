scene_context: >
  The Wanderer reflects on exile, lost fellowship, dead lords, and vanished
  halls. The famous "where is" passage mourns a disappeared heroic world.

script: |
  In The Wanderer, an exile moves through a broken world asking:

  "Where is the horse? Where the rider? Where the giver of treasure?"

  This is not just nostalgia.
  It is the shock of discovering that whole worlds vanish.

  Friends die.
  Halls empty.
  Warmth leaves.

  But the poem does not collapse into self-pity.
  It turns grief into endurance.

  What passes away was never yours to keep forever.

  Only your bearing was.

