script: |
  In the Völuspá, a seeress speaks to Odin and tells him what even gods must face:

  "Brothers shall fight and fell each other. Hard is it on earth."

  Brothers will fight.
  The world will darken.
  What is made will break.

  The northern mind does not promise safety.
  It does not flatter you with permanence.

  It says: learn to live under fate without becoming small.

  The strong person is not the one who thinks the end cannot come.

  It is the one who stands upright while it approaches.

