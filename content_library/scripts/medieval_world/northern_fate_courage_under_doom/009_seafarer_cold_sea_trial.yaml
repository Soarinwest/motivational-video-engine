scene_context: >
  The Seafarer describes the hardship of life on the winter sea: cold, hunger,
  isolation, waves, birds, and longing. The sea is both physical trial and
  spiritual discipline.

script: |
  In The Seafarer, the speaker remembers the sea plainly:

  "My feet were by frost benumbed."

  No glamour.
  No comfort.
  No false romance.

  The trial matters because hardship strips a person down.
  It shows what softness had hidden.

  Cold.
  Hunger.
  Isolation.
  The long pull forward.

  There are things you only learn when the shore is gone.

  Some truths arrive frozen.

