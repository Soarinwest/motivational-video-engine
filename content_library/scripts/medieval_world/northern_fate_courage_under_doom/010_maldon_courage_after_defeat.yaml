scene_context: >
  In The Battle of Maldon, after Byrhtnoth has fallen and defeat is near,
  Byrhtwold exhorts the remaining warriors not to flee. The speech is one of
  the clearest expressions of courage under doom in Old English literature.

script: |
  In The Battle of Maldon, after disaster has already come, Byrhtwold says:

  "Will shall be the sterner, heart the bolder, spirit the greater as our strength lessens."

  That is the northern ethic in one stroke.

  Courage is not confidence in victory.
  It is refusal to collapse when victory is slipping away.

  When the numbers turn,
  when the leader falls,
  when the ending darkens —

  that is when character is seen.

  Stand harder when hope gets thinner.

