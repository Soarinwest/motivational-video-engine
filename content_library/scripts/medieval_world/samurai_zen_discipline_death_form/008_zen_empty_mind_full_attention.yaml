script: |
  The empty mind is not a dead mind.

  It is a mind no longer crowded by performance.

  No audience inside the skull.
  No argument with the moment.
  No endless rehearsal of the self.

  Just attention.

  This is harder than noise.
  Harder than ambition.
  Harder than appearing profound.

  Sit.
  Breathe.
  See the thing before you.

  A scattered mind cannot make a clean cut.

