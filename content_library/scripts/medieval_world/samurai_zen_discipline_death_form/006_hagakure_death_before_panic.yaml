scene_context: >
  Hagakure repeatedly emphasizes death-awareness as a way to remove
  hesitation, panic, and self-protective confusion in moments of action.

script: |
  Hagakure gives one of the severest samurai teachings:

  the way is found in death.

  Do not read that as a hunger to die.
  Read it as training against panic.

  A person who refuses to think about death becomes ruled by fear when death enters the room.

  Death-awareness cuts through vanity.
  It cuts through delay.
  It asks what matters now.

  Remember death, not to worship it —

  but to stop being owned by it.

