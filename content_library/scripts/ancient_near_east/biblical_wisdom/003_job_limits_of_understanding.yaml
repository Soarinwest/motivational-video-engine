  the limits of human knowledge.

script: |
  In Job, after suffering and argument, the answer comes from the whirlwind:

  "Where wast thou when I laid the foundations of the earth?"

  It is not a neat explanation.
  It is a confrontation with scale.

  Job is not told that his pain is small.
  He is shown that his sight is partial.

  Some suffering will not fit inside your explanation.

  Humility begins where control runs out.

