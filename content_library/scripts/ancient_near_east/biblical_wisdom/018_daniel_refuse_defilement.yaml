scene_context: >
  Daniel is in exile in Babylon and placed under imperial pressure to
  assimilate at the level of diet, court training, and identity.

script: |
  Daniel is in exile, inside another empire's court.

  The text says:

  "Daniel purposed in his heart that he would not defile himself."

  Notice where resistance begins.

  Not with noise.
  Not with spectacle.
  Not with public performance.

  In the heart.

  Before the pressure comes, he has already decided what he will not become.

  If you wait until the room is watching, you may decide too late.

