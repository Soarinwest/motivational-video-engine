scene_context: >
  Lamentations speaks from catastrophe and ruin. The claim of mercy
  comes not from comfort, but from inside grief.

script: |
  Lamentations speaks from ruin, not comfort:

  "It is of the LORD's mercies that we are not consumed… they are new every morning."

  This is not cheap hope.
  The city has fallen.
  Grief is real.
  Loss is real.

  But mercy is still named.

  Sometimes endurance is not a shout.

  It is waking again after devastation and finding one more morning given.

  Begin there.

