script: |
  Isaiah speaks to the weary:

  "They that wait upon the LORD shall renew their strength."

  This is not the language of instant victory.
  It is the language of endurance.

  Some strength is not seized.
  It is renewed.

  Waiting can be cowardice.
  But it can also be discipline:
  refusing panic,
  refusing despair,
  refusing to let exhaustion become your god.

  Be still long enough to be restored.

