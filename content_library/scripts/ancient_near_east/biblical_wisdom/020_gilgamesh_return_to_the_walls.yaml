scene_context: >
  After failing to secure immortality, Gilgamesh returns to Uruk and
  points to the city walls. The human answer to death is not escape,
  but return, work, memory, and what has been built.

script: |
  Gilgamesh searches for eternal life and loses it.

  He does not return immortal.
  He returns human.

  At the end, he points to the walls of Uruk.

  Not because stone defeats death.
  It does not.

  But because a mortal life can still build, protect, remember, and return.

  The lesson is severe:
  you may not escape death.

  Still, you must come home and build.

