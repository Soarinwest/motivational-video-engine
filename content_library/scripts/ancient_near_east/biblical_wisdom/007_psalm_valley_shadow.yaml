scene_context: >
  Psalm 23 is a poem of trust using shepherd imagery. The speaker does
  not deny danger; he passes through it under divine presence.

script: |
  The psalm does not say there is no valley.

  It says:

  "Yea, though I walk through the valley of the shadow of death, I will fear no evil."

  The shadow is real.
  The path is real.
  The danger is real.

  But fear is not given the throne.

  Some darkness has to be walked through, not explained away.

  Keep walking.

  The valley is not your final name.

