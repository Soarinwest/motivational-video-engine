script: |
  Jeremiah tries to hold back.

  Then he says:

  "His word was in mine heart as a burning fire shut up in my bones."

  This is not comfortable inspiration.
  It is burden.

  Some truths do not make you popular.
  Some truths do not make you safe.
  But silence can become its own kind of wound.

  When the heart knows what must be spoken, avoidance becomes fire.

  Speak cleanly.
  Do not perform the flame.

