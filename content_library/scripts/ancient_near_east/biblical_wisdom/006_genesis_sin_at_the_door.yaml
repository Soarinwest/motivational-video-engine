scene_context: >
  Before Cain kills Abel, God warns him that sin is crouching at the
  door and that he must master it. The warning comes before the act.

script: |
  In Genesis, before Cain kills Abel, the warning comes first:

  "Sin lieth at the door… and thou shalt rule over him."

  The danger is not yet blood on the ground.
  It is resentment at the threshold.

  Envy.
  Anger.
  The story you tell yourself before harm becomes action.

  This is where responsibility begins.

  Do not wait until the damage is done to notice what has been crouching at the door.

