script: |
  Psalm 90 gives a prayer for mortal people:

  "So teach us to number our days, that we may apply our hearts unto wisdom."

  This is not morbid.
  It is clarifying.

  You do not have endless time.
  You do not have endless chances.
  You do not have endless attention.

  Numbering your days is not despair.

  It is how the heart stops wasting what cannot be replaced.

  Count the days.
  Then live like they matter.

