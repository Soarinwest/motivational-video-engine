script: |
  Proverbs gives a command before the damage appears:

  "Keep thy heart with all diligence; for out of it are the issues of life."

  Guard the source.

  Not just the action.
  Not just the reputation.
  Not just the visible failure.

  The heart moves first.

  What you feed there will eventually speak, choose, and act.

  Do not wait until life breaks open to ask what has been growing within.

