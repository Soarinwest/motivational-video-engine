scene_context: >
  Proverbs warns that pride generates consequence. Pride is framed not
  as confidence but as blindness before collapse.

script: |
  Proverbs gives the warning plainly:

  "Pride goeth before destruction, and an haughty spirit before a fall."

  Pride does not always look loud.
  Sometimes it looks like refusing correction.
  Refusing counsel.
  Refusing to admit that the path is cracking.

  The fall rarely begins at the edge.

  It begins when you decide you no longer need to listen.

  If no one can warn you, reality will.

