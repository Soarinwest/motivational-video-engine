scene_context: >
  Micah reduces public righteousness to justice, mercy, and humility
  rather than mere ritual display.

script: |
  Micah asks what is required:

  "To do justly, and to love mercy, and to walk humbly with thy God."

  Not performance.
  Not noise.
  Not public righteousness as costume.

  Justice is what you do.
  Mercy is what you love.
  Humility is how you walk.

  Leave out one, and the soul bends out of shape.

  Be just.
  Be merciful.
  Do not make yourself the god of either.

