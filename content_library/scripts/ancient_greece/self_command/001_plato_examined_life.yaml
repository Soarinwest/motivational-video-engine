script: |
  Socrates, in Plato's Apology, gives us one of the hardest lines in philosophy:

  "The life which is unexamined is not worth living."

  He is not saying your life must be flawless.
  He is saying you cannot drift forever and call it freedom.

  Look at your habits.
  Look at your excuses.
  Look at what you are becoming.

  Examine it before life does.

