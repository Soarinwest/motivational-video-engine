scene_context: >
  Nicomachean Ethics II: moral virtues are not given by nature; they are
  formed by practice.

script: |
  In the Nicomachean Ethics, Aristotle writes that moral virtues do not simply appear in us by nature:

  "We are adapted by nature to receive them, and are made perfect by habit."

  This means you are not doomed by your first impulse.
  But you are responsible for what you train.

  Every repeated act is instruction.
  Every excuse is instruction.
  Every restraint is instruction.

  You are always practicing something.

  Choose carefully.
  Practice becomes character.

