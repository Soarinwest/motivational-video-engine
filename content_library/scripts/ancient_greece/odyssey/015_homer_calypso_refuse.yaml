script: |
  Calypso offers Odysseus eternal life.

  Stay with her on the island. Beautiful. Endless.
  Never grow old. Never die.

  He says no.

  Not because the island is bad.
  Because eternal life on a stranger's island
  is not life. It is a prison disguised as one.

  Penelope is mortal. Telemachus is mortal.
  Ithaca will not wait forever.

  A life that cannot end cannot fully begin.

  He went home to die.

