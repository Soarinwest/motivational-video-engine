script: |
  In Book XI of the Odyssey, Odysseus rows to the edge of the world.

  He sails to the land of the dead
  to ask the blind prophet Tiresias the way home.

  Tiresias does not flatter the living.

  He tells Odysseus: yes, you will get back.
  But the homecoming is not the end.

  You will leave again, inland this time,
  carrying an oar on your shoulder
  until a stranger asks why you carry that strange winnowing fan.

  Then you may plant it. Then you may rest.

  Some answers live only on the other side
  of the threshold you fear to cross.

  And the journey continues past the homecoming.

