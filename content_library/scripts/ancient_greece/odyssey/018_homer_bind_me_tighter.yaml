scene_context: >
  Odysseus knows in advance that he will not be able to resist the Sirens'
  song. He plans his own restraint before the temptation begins. He is tied
  to the mast and tells the crew: when I beg to be released — and I will — do
  not loosen me. Tighten the ropes.

script: |
  In Book XII of the Odyssey, before the Sirens, Odysseus knows what is coming.

  He knows that when the music starts, he will not be the man he is now.

  So he gives his crew instructions while he can still mean them:

  "If I beg you and bid you to set me free, then bind me more tightly still."

  Self-control is rarely heroic in the moment.

  Most of it is an instruction left in advance, for a future self you do not yet trust.

  The man who plans his restraint before the temptation arrives.

  Bind me tighter.

