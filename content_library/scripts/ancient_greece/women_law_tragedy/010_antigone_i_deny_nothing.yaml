  dissemble.

script: |
  In Sophocles' Antigone, Creon asks whether she committed the forbidden burial.
  Antigone answers:

  "I did it, I deny it not."

  This is moral courage without performance.
  She does not hide behind confusion.
  She does not outsource the consequence.

  Whether she is right or doomed, she owns the act.

  For us, the lesson is severe: if conscience demands a choice, do not dress it up as accident.

  Stand where you chose to stand.

