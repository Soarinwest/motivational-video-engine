  of the gods.

script: |
  In Sophocles' Antigone, Creon's edict forbids her brother's burial.

  Antigone tells the king why she defied it:

  "Nor did I deem that thou, a mortal man, could'st by a breath annul and override the immutable unwritten laws of Heaven."

  Power can pass laws. It cannot author conscience.

  When the two collide, conscience is older.

  The code in your hand was written this morning.
  The one in your chest was written before any of us got here.

  Answer to the older ones.

