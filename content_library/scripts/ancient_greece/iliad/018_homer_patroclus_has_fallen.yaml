scene_context: >
  Achilles is still in his tent, still refusing to fight, still punishing
  Agamemnon by withholding himself from the war. Antilochus runs across the
  camp with news he does not want to deliver. Patroclus wore Achilles's armor
  into battle and was killed by Hector.

script: |
  In Book XVIII of the Iliad, Antilochus runs across the Greek camp to the tent he does not want to enter.

  He delivers six words:

  "Patroclus has fallen, and they are fighting around his body."

  Achilles has refused embassy, gifts, reason.

  Pride could not move him.
  Grief did.

  The cost of a man's pride is paid by the people he loves.

  The pride that kept him in the tent could not be moved by any argument.

  Only by a corpse.

