script: |
  In the Iliad, Book VI, Hector says goodbye to his wife and infant son
  at the gates of Troy.

  The child cries at the bronze helmet —
  the gleaming crest, the warrior's mask of war.

  So Hector takes it off.
  He kisses the boy. He prays for him.

  Then he puts the helmet back on
  and walks toward the man who will kill him.

  Honor is what you do for the people who would still keep you home.

  He set the helmet down.
  Then he went.

