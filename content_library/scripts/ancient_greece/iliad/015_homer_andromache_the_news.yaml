script: |
  In Book XXII of the Iliad, Andromache does not know her husband is dead yet.

  She is at the loom, weaving a purple cloak with flowers.

  She has called for the maids to warm his bath.

  Then the wail goes up from the walls.

  She runs out, sees what is being dragged behind the chariot, and the veil Aphrodite gave her on her wedding day falls from her head.

  The bath was still warming.

  That is where the war ended for her.

  The veil fell.

