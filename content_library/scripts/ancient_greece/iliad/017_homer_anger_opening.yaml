scene_context: >
  The poem's first line. Before any character speaks, the narrator declares
  the whole epic to be the song of one man's wrath. The Iliad is not the
  story of the Trojan War. It is the story of Achilles being angry — and what
  that anger cost everyone else.

script: |
  The first words of the Iliad are not about glory, courage, or victory.

  The poet invokes the Muse with one subject:

  "Sing, O goddess, the anger of Achilles, son of Peleus, that brought countless ills upon the Achaeans."

  Anger is the first word of Western literature.

  Everything that follows — the quarrel, the withdrawal, the dead friend, the dragged body — is the receipt.

  A great man's anger is rarely his own.
  It leaks out of his life into the lives of the people who depend on him.

  And what it cost.

