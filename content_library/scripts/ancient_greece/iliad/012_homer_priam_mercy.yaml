script: |
  In Book XXIV of the Iliad, the war is almost over.
  Hector is dead. Achilles killed him.

  And then, at night, alone, the king of Troy
  crosses the battlefield to the tent of the man who killed his son.

  Priam kneels.
  He asks for the body.

  Achilles weeps.
  He gives it back.

  When you have no reason left to be merciful —
  no honor demanding it, no audience to see it —
  that is the only place mercy lives.

  They wept.
  He gave him back.

