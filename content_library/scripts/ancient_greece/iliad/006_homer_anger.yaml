script: |
  In Homer's Iliad, the war turns on rage, rank, and wounded pride.

  "Son of Atreus, check your anger, I implore you."

  The warning is simple: power does not make anger wise.
  It only makes anger expensive.

  A leader's pride can become another man's grave.
  A private insult can become public ruin.

  Before you answer from rage, count the cost.

  Anger may feel like strength.
  Often, it is command lost.

