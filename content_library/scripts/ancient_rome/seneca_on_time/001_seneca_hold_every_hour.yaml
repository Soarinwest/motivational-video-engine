script: |
  In his first letter to Lucilius, Seneca writes:

  "Hold every hour in your grasp. Lay hold of today's task, and you will not need to depend so much upon tomorrow's."

  Time is not stolen by other people.

  It leaks out of every hour you do not consciously hold.

  The man who postpones is not waiting.
  He is paying tomorrow with hours he has not yet earned.

  Close the hand on the hour.

