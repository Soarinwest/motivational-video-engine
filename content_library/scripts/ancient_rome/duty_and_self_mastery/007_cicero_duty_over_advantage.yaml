script: |
  In De Officiis Book Three, Cicero takes up the oldest excuse and refuses it:

  "Whatever is morally right is also expedient, and what is morally wrong is also inexpedient."

  Right and useful are not opposites.

  The man who pits honor against advantage has misread both.

  There is no clean transaction in which you trade conscience for gain.

  The man who thinks he made it pays later — and not in the currency he expected.

  There is no clean trade.

