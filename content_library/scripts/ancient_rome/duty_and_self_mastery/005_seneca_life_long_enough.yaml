script: |
  In On the Shortness of Life, Seneca opens with the universal complaint, and then inverts it:

  "It is not that we have a short time to live, but that we waste much of it. Life is long enough — if it were all well invested."

  You do not have too little life.

  You waste too much of the life you have.

  Time is not the scarce resource. Attention is.

  The man who attends to his life finds it long enough.

  Invest the rest.

