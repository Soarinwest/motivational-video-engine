script: |
  In Letter Thirteen, Seneca writes to Lucilius about the fears that wear a man out before the thing he fears arrives:

  "There are more things likely to frighten us than there are to crush us. We suffer more often in imagination than in reality."

  Most of the catastrophe is in your head.

  The body endures less than the mind rehearses.

  Imagined suffering is the cheap kind — paid for in advance, on a debt that mostly never comes due.

  Stop rehearsing it.

