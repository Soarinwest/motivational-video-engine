script: |
  In Meditations Book II, Marcus writes the single sentence the rest of the book is built around:

  "Since it is possible that thou mayest depart from life this very moment, regulate every act and thought accordingly."

  Death is not a future event.

  It is the standard against which the next move is measured.

  If this were the last act — would you still be doing it this way?

  Regulate the next act accordingly.

