script: |
  In Meditations Book II, Marcus instructs himself on the next thing in front of him:

  "Every moment think steadily, as a Roman and a man, to do what thou hast in hand with perfect and simple dignity — and to give thyself relief from all other thoughts."

  Most failure is not lack of effort.

  It is the part of the mind that is somewhere else while the hands work.

  The man who lays down every other thought owns the moment in front of him.

  Put the rest down.

