scene_context: >
  The Rubicon is a small river. Crossing it with an army is treason — the
  Senate forbids any general to bring troops into Italy proper. On the north
  bank Caesar pauses. Plutarch records him saying the decision is made — and
  then he crosses, with his army, and the Republic is over.

script: |
  In Plutarch's Life of Caesar, the Rubicon is a small river. The Senate forbids any general to bring an army across it.

  Caesar pauses on the north bank with his legions.

  He knows the crossing costs not just his own future but a thousand years of Roman constitutional order.

  Plutarch records the words he gives himself before he moves:

  "The die is cast."

  Ambition's most expensive feature is the line you cannot uncross.

  Most decisions a man regrets were obvious before he made them.

  He crossed.

