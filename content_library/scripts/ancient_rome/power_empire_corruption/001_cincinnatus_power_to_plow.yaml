scene_context: >
  Rome is in crisis. A consul and an army are surrounded by the Aequi. The
  Senate calls Cincinnatus from his small farm across the Tiber and makes him
  dictator with absolute power. He raises an army, lifts the siege, and
  defeats the enemy in sixteen days. Then he lays down the dictatorship and
  returns to his plow.

script: |
  In Livy's history, Rome is in crisis. The Senate calls Cincinnatus from his small farm and makes him dictator.

  In sixteen days he raises an army, defeats the enemy, and lifts the siege.

  Then he lays down absolute power, picks up his plow, and walks home.

  The test of character is not the seizing.

  It is the release.

  Most men can be trusted to take a sword.
  Almost none can be trusted to set it down on the table while the room is still afraid.

  He went back to the plow.

