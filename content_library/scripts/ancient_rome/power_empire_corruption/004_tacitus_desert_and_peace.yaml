scene_context: >
  Tacitus's father-in-law Agricola has spent years subduing Britain. Calgacus
  is the leader of the last unconquered tribes. On the eve of the battle that
  will end Caledonian freedom, Tacitus gives him a speech — a Roman historian
  putting Rome's harshest self-critique into the mouth of its enemy.

script: |
  In his book on his father-in-law Agricola, the Roman historian Tacitus gives the harshest critique of Roman conquest to a Caledonian chieftain on the eve of his last battle:

  "To plunder, butcher, steal — these things they misname empire. They make a desert and call it peace."

  Tacitus is a Roman writing about his own.

  He admits the conquered are not wrong.

  Power renames its costs to make them disappear from the ledger.

  Any time the word does not match the thing it describes — look for the desert.

  They call it peace.

