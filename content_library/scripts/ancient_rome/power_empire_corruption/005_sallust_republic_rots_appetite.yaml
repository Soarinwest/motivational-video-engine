scene_context: >
  Sallust has lived through the civil wars. He has been expelled from the
  Senate. He sits down to explain how Rome got here, and his answer is not
  Catiline. His answer is the long erosion: once external pressure ended,
  internal appetite was free to grow. Avarice, luxury, factionalism, the loss
  of public virtue.

script: |
  In The Conspiracy of Catiline, Sallust looks back on civil wars he has lived through. He sits down to explain how Rome got here, and his answer is not Catiline.

  His answer is appetite:

  "Avarice destroyed honor, integrity, and every other virtue, and put arrogance and cruelty in their place."

  A republic does not fall to invasion.

  It rots from inside — once external pressure ends and internal hunger has nothing left to push against.

  Institutions are hollowed out by the long abandonment of the small disciplines that kept them upright.

  Catiline is what grew in the soil they stopped tending.

