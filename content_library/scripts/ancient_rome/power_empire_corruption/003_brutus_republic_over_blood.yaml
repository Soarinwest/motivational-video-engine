script: |
  In Plutarch's Life of Brutus, Caesar has called Brutus his son.

  The conspirators come to Brutus and remind him that his ancestor expelled the kings of Rome five centuries earlier.

  They ask: will you put personal love above the Republic, or the Republic above personal love?

  Brutus chooses the Republic.

  He helps kill the man who loved him.

  And the Republic still died.

  The duty that costs you the most is the one that does not solve the problem.

  Brutus's example is not the simple instruction to do the right thing.

  It is the harder one: do the right thing knowing it will not work.

