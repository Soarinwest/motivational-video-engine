scene_context: >
  Book III of De Rerum Natura is Lucretius's long argument that the fear of
  death is the root of nearly every other human misery. Men pursue power,
  pile up wealth, betray friends — usually because the awareness of death is
  gnawing at them and they cannot meet it directly. Lucretius takes the fear
  apart, line by line.

script: |
  In Book Three of De Rerum Natura, Lucretius takes the longest run at any subject in his poem: the fear of death.

  His argument is cold and clean:

  "Death therefore is nothing to us, nor concerns us in the least."

  When death arrives, you are not there to meet it.
  When you are here, it is not.

  Lucretius is not arguing that dying is fine.

  He is arguing that the fear of death is what steals the years you still have.

  Stop rehearsing it.

  And the time stays yours.

