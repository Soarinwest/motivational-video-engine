script: |
  In Meditations Book Four, Marcus is on the Danube frontier. He has no quiet country house to escape to.

  So he writes himself the instruction:

  "Men seek retreats for themselves, houses in the country, sea-shores, and mountains. But it is in thy power whenever thou shalt choose to retire into thyself."

  Other men go to the country to escape.

  You can go to the same place without leaving the room.

  The retreat that matters is the one you do not have to travel to.

  It is built, not found.

  Step in.

