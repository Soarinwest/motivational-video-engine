script: |
  In Meditations Book Four, Marcus catches himself acting as if he has unlimited time.

  He writes the correction to himself in a single sentence:

  "Do not act as if thou wert going to live ten thousand years. Death hangs over thee. While thou livest, while it is in thy power, be good."

  He is not threatening himself.

  He is naming the constraint that makes the present serious.

  Time-management language assumes you get the years.

  You do not.

  While it is in thy power, be good.

