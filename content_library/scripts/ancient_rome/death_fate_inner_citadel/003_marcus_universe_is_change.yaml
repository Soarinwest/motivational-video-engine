script: |
  In Meditations Book Seven, Marcus addresses the part of himself that resents change.

  He poses the question directly:

  "Is any one afraid of change? Why, what can take place without change? What then is more pleasing or more suitable to the universal nature?"

  He is not consoling himself.

  He is naming the category error.

  Resentment of change is resentment of existence itself.

  The same flux you mourn is the one that produced everything you have ever loved.

  It is the only thing that ever lets anything be.

