  picture is the founding image of *pietas*.

script: |
  In Book Two of the Aeneid, Troy is burning.

  Aeneas's father Anchises tells his son to leave him. He is old. The city is finished. There is no point.

  Aeneas does not argue. He does not explain. He lifts the old man onto his shoulders:

  "Come then, dear father, mount upon my neck. I will bear you up on my own shoulders, nor will this burden weigh me down."

  Duty is not an abstraction.

  It is the weight of the person you cannot leave behind.

  He picked up the man who carried him, and walked.

