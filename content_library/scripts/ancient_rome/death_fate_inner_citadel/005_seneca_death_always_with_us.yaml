scene_context: >
  Senecio was prosperous, young, ambitious, scheduled. He died suddenly.
  Seneca writes Lucilius the letter the death raises in him: stop postponing
  life on the assumption that there will be time. Death is not a future event
  for which you can prepare. It is present every day in every minute.

script: |
  In Letter One Hundred and One, Seneca writes to Lucilius after a wealthy young friend has died suddenly.

  He takes the occasion to remove the reflex that always tempts the prosperous reader:

  "Let us so order our minds as if we had come to the very end. Let us postpone nothing. Let us balance life's account every day."

  Death is not the future.

  It is always already here.

  Stop running the bookkeeping of a life as if there are unlimited entries to come.

  Close today's accounts before nightfall.

